  {key:"categories",label:"Categories",icon:"⊞",desc:"Task categories",cols:["name","color"],hasColor:true},
  {key:"tags",label:"Tags",icon:"🏷️",desc:"Classification labels",cols:["name","color"],hasColor:true},
  {key:"suppliers",label:"Suppliers",icon:"📦",desc:"Approved suppliers",cols:["name"]},
  {key:"contractors",label:"Contractors",icon:"🏗️",desc:"Responsible contractors",cols:["name"]},
  {key:"reqCodes",label:"Req. Codes",icon:"📎",desc:"Requisition codes",cols:["name"]},
  {key:"originalStatuses",label:"Statuses",icon:"⊙",desc:"Original status options",cols:["name"]},
  {key:"photos_ref",label:"Photos",icon:"📷",desc:"All uploaded photos",virtual:true},
];

function DatabasePage({db,setDb,tasks,onTaskClick,users}){
  const [activeTab,setActiveTab]=useState("locations");
  const [addF,setAddF]=useState({});const [addCol,setAddCol]=useState(COLOR_PALETTE[0]);
  const [editId,setEditId]=useState(null);const [editF,setEditF]=useState({});
  const importRef=useRef();

  const sec=DB_SECTIONS.find(s=>s.key===activeTab);
  const data=db[activeTab]||[];

  const allPhotos=useMemo(()=>{const r=[];tasks.forEach(t=>(t.photos||[]).forEach(p=>r.push({...p,task:t})));return r;},[tasks]);
  const download=p=>{const a=document.createElement("a");a.href=p.data;a.download=p.name;a.click();};

  const handleAdd=()=>{if(!(addF.name||"").trim())return;const ni={id:Date.now(),...addF};if(sec.hasColor)ni.color=addCol;setDb(d=>({...d,[activeTab]:[...data,ni]}));setAddF({});setAddCol(COLOR_PALETTE[0]);};
  const handleDel=id=>{if(!window.confirm("Remove?"))return;setDb(d=>({...d,[activeTab]:data.filter(x=>x.id!==id)}));};
  const startEdit=item=>{setEditId(item.id);setEditF({...item});};
  const saveEdit=()=>{setDb(d=>({...d,[activeTab]:data.map(x=>x.id===editId?{...editF}:x)}));setEditId(null);};

  const exportSec=()=>{
    if(sec.virtual)return;
    const hdrs=sec.cols.concat(sec.hasColor?["color"]:[]);
    const rows=data.map(r=>hdrs.map(h=>`"${String(r[h]||"").replace(/"/g,'""')}"`).join(","));
    const csv=[hdrs.join(","),...rows].join("\n");
    const url=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    const a=document.createElement("a");a.href=url;a.download=`fieldwork-db-${activeTab}.csv`;a.click();URL.revokeObjectURL(url);
  };
  const handleImport=e=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const lines=ev.target.result.split("\n").filter(l=>l.trim());
      if(lines.length<2){alert("No data rows found.");return;}
      const hdrs=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim());
      const rows=lines.slice(1).map(line=>{const vals=line.split(",").map(v=>sanitize(v.replace(/^"|"$/g,"")));const o={id:Date.now()+Math.random()};hdrs.forEach((h,i)=>{o[h]=vals[i]||"";});return o;}).filter(r=>r.name);
      if(rows.length>0){setDb(d=>({...d,[activeTab]:[...data,...rows]}));alert(`✅ Imported ${rows.length} rows.`);}
    };
    reader.readAsText(file);e.target.value="";
  };

  const fields=(sec.cols||[]).filter(c=>c!=="color");

  return(
    <div className="db-page">
      <div className="db-page-hd">
        <div><div className="db-page-title">🗃️ Database</div><div className="db-page-desc">Manage all reference data used in task attributes. Changes apply instantly.</div></div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {!sec?.virtual&&<><button className="btn btn-s" onClick={exportSec}>⬇ Export {sec?.label}</button><input ref={importRef} type="file" accept=".csv" style={{display:"none"}} onChange={handleImport}/><button className="btn btn-p" onClick={()=>importRef.current?.click()}>⬆ Import CSV</button></>}
        </div>
      </div>

      <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",gap:12}}>
        <span style={{fontSize:18}}>💡</span>
        <div>
          <div style={{fontWeight:700,fontSize:13,color:"#1d4ed8",marginBottom:2}}>How to manage data</div>
          <div style={{fontSize:12.5,color:"#3b82f6",lineHeight:1.6}}><b>In-app:</b> Add/edit/delete rows directly. &nbsp;<b>Excel/CSV:</b> Export → edit in Excel → Import. Keep the header row. The <code>name</code> column is required.</div>
        </div>
      </div>

      <div className="db-tabs">
        {DB_SECTIONS.map(s=>(
          <button key={s.key} className={`db-tab${activeTab===s.key?" act":""}`} onClick={()=>setActiveTab(s.key)}>
            {s.icon} {s.label} <span className="db-tab-cnt">{s.virtual?(s.key==="photos_ref"?allPhotos.length:users.length):((db[s.key]||[]).length)}</span>
          </button>
        ))}
      </div>

      {/* VIRTUAL: PEOPLE */}
      {activeTab==="people_ref"&&(
        <div className="db-card">
          <div className="db-card-hd"><div><div className="db-card-title">👤 People — Team Members</div><div className="db-card-desc">Manage users in the Users section (Admin only).</div></div></div>
          <table className="db-table">
            <thead><tr><th>Avatar</th><th>Name</th><th>Role</th><th>Email</th><th>Status</th></tr></thead>
            <tbody>
              {users.map(u=>(
                <tr key={u.id}>
                  <td><div style={{width:28,height:28,borderRadius:7,background:u.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#fff"}}>{u.initials}</div></td>
                  <td style={{fontWeight:600}}>{u.name}</td>
                  <td><span className="role-badge" style={{background:ROLE_COLORS[u.role].bg,color:ROLE_COLORS[u.role].color}}>{ROLE_ICONS[u.role]} {u.role}</span></td>
                  <td style={{fontSize:12.5,color:"#6b7280"}}>{u.email}</td>
                  <td><span className="status-badge" style={{background:u.status==="active"?"#dcfce7":"#fef9c3",color:u.status==="active"?"#16a34a":"#d97706"}}>● {u.status}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* VIRTUAL: PHOTOS */}
      {activeTab==="photos_ref"&&(
        <div className="db-card">
          <div className="db-card-hd"><div><div className="db-card-title">📷 All Photos</div><div className="db-card-desc">{allPhotos.length} photo{allPhotos.length!==1?"s":""} uploaded across all tasks.</div></div></div>
          {allPhotos.length===0&&<div className="db-empty">No photos uploaded yet. Upload photos via task detail panels.</div>}
          <table className="db-table">
            <thead>{allPhotos.length>0&&<tr><th>Preview</th><th>File Name</th><th>Task</th><th>Uploaded</th><th>Size</th><th>Action</th></tr>}</thead>
            <tbody>
              {allPhotos.map(p=>(
                <tr key={p.id}>
                  <td><img src={p.data} style={{width:50,height:40,objectFit:"cover",borderRadius:6,border:"1px solid #e5e7eb",cursor:"pointer"}} onClick={()=>download(p)} title="Click to download"/></td>
                  <td style={{fontWeight:600,fontSize:13}}>{p.name}</td>
                  <td><span style={{color:"#2563eb",fontWeight:600,cursor:"pointer",fontSize:12.5}} onClick={()=>onTaskClick(p.task)}>#{p.task.id} {p.task.title}</span></td>
                  <td style={{fontSize:12,color:"#9ca3af"}}>{p.uploadedAt}</td>
                  <td style={{fontSize:12,color:"#9ca3af"}}>{p.size}</td>
                  <td><button className="btn btn-s" style={{fontSize:11.5,padding:"3px 10px"}} onClick={()=>download(p)}>⬇ Download</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* REGULAR TABLE */}
      {!sec?.virtual&&(
        <div className="db-card">
          <div className="db-card-hd"><div><div className="db-card-title">{sec.icon} {sec.label}</div><div className="db-card-desc">{sec.desc}</div></div></div>
          <table className="db-table">
            <thead><tr>
              {sec.hasColor&&<th style={{width:50}}>Color</th>}
              {fields.map(f=><th key={f} style={{textTransform:"capitalize"}}>{f}</th>)}
              <th style={{width:110}}>Actions</th>
            </tr></thead>
            <tbody>
              {data.length===0&&<tr><td colSpan={fields.length+(sec.hasColor?2:1)} className="db-empty">No entries yet.</td></tr>}
              {data.map(row=>(
                <tr key={row.id}>
                  {sec.hasColor&&<td>{editId===row.id?(<div className="color-swatches">{COLOR_PALETTE.map(c=><div key={c} className="db-color-swatch" style={{background:c,outline:editF.color===c?"3px solid #1a1d23":""}} onClick={()=>setEditF(f=>({...f,color:c}))}/>)}</div>):(<div style={{width:22,height:22,borderRadius:6,background:row.color||"#e5e7eb"}}/>)}</td>}
                  {fields.map(f=><td key={f}>{editId===row.id?<input className="db-inline-edit" value={editF[f]||""} onChange={e=>setEditF(ef=>({...ef,[f]:e.target.value}))}/>:<span style={f==="name"&&row.color?{fontWeight:600,color:row.color}:{}}>{row[f]||<span style={{color:"#c4c9d4"}}>—</span>}</span>}</td>)}
                  <td><div style={{display:"flex",gap:4}}>
                    {editId===row.id?(<><button className="btn btn-p" style={{padding:"3px 10px",fontSize:11.5}} onClick={saveEdit}>Save</button><button className="btn btn-s" style={{padding:"3px 10px",fontSize:11.5}} onClick={()=>setEditId(null)}>Cancel</button></>):(<><button className="btn btn-g" style={{padding:"3px 8px"}} onClick={()=>startEdit(row)}>✏️</button><button className="btn btn-del" style={{padding:"3px 8px",margin:0}} onClick={()=>handleDel(row.id)}>🗑</button></>)}
                  </div></td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="db-add-row">
            {sec.hasColor&&<div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}><span style={{fontSize:10.5,color:"#9ca3af",fontWeight:700,textTransform:"uppercase"}}>Color</span><div className="color-swatches">{COLOR_PALETTE.map(c=><div key={c} className="db-color-swatch" style={{background:c,outline:addCol===c?"3px solid #1a1d23":""}} onClick={()=>setAddCol(c)}/>)}</div></div>}
            {fields.map(f=><input key={f} className="db-add-input" placeholder={f.charAt(0).toUpperCase()+f.slice(1)+"…"} value={addF[f]||""} onChange={e=>setAddF(af=>({...af,[f]:e.target.value}))} onKeyDown={e=>{if(e.key==="Enter")handleAdd();}}/>)}
            <button className="btn btn-p" onClick={handleAdd}>＋ Add</button>
          </div>
        </div>
      )}

      {!sec?.virtual&&(
        <div style={{background:"#f8f9fc",border:"1px solid #e5e7eb",borderRadius:10,padding:"12px 16px"}}>
          <div style={{fontWeight:700,fontSize:12.5,color:"#374151",marginBottom:5}}>📋 CSV Template for "{sec.label}"</div>
          <code style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#6b7280",display:"block",background:"#eef0f6",padding:"8px 12px",borderRadius:7,lineHeight:1.8}}>
            {sec.cols.concat(sec.hasColor?["color"]:[]).join(",")}<br/>
            {fields.map(f=>`"Example ${f}"`).join(",")}{sec.hasColor?`,"#3b82f6"`:""}
          </code>
        </div>
      )}
    </div>
  );
}


/* ════════════════════════════════
   PROFILE MODAL  (all roles)
════════════════════════════════ */
function ProfileModal({currentUser, users, onUpdateUser, onClose}){
  const [f,setF]=useState({
    name:currentUser.name||"",
    initials:currentUser.initials||"",
    email:currentUser.email||"",
    color:currentUser.color||"#2563eb",
    currentPw:"",newPw:"",confirmPw:""
  });
  const [errors,setErrors]=useState({});
  const [saved,setSaved]=useState(false);
  const set=(k,v)=>setF(x=>({...x,[k]:v}));

  const pwStrength=pw=>{if(!pw)return{w:0,c:"#e5e7eb",l:""};if(pw.length<6)return{w:33,c:"#ef4444",l:"Weak"};if(pw.length<10)return{w:66,c:"#f59e0b",l:"Fair"};return{w:100,c:"#16a34a",l:"Strong"};};
  const str=pwStrength(f.newPw);

  useEffect(()=>{const esc=e=>{if(e.key==="Escape")onClose();};window.addEventListener("keydown",esc);return()=>window.removeEventListener("keydown",esc);},[onClose]);

  const submit=async()=>{
    const e={};
    if(!f.name.trim()) e.name="Name is required.";
    if(!f.email.trim()) e.email="Email is required.";
    if(!f.initials.trim()) e.initials="Initials required.";
    if(f.newPw||f.currentPw||f.confirmPw){
      // Support both hashed and plaintext current passwords (migration period)
      const curOk=isHashed(currentUser.password)
        ?(hashPassword(f.currentPw).then?true:false)  // async check handled below
        :(f.currentPw===currentUser.password);
      if(f.newPw.length<6) e.newPw="New password must be at least 6 characters.";
      if(f.newPw!==f.confirmPw) e.confirmPw="Passwords do not match.";
    }
    if(Object.keys(e).length){setErrors(e);return;}
    // Hash new password
    let finalPw=currentUser.password;
    if(f.newPw){
      // Verify current password first
      const curHash=await hashPassword(f.currentPw);
      const curOk=isHashed(currentUser.password)?curHash===currentUser.password:f.currentPw===currentUser.password;
      if(!curOk){setErrors({currentPw:"Current password is incorrect."});return;}
      finalPw=await hashPassword(f.newPw);
    }
    const updated={...currentUser,
      name:f.name.trim(),initials:f.initials.toUpperCase().slice(0,3),
      email:f.email.trim(),color:f.color,
      password:finalPw
    };
    await onUpdateUser(updated);
    setErrors({});setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };

  return(
    <div className="modal-ov" onClick={onClose}>
      <div className="modal" style={{maxWidth:480}} onClick={e=>e.stopPropagation()}>
        <div className="m-hd">
          <h2 className="m-ht">My Profile</h2>
          <button className="btn btn-g btn-ic" onClick={onClose} aria-label="Close">✕</button>
        </div>
        <div className="m-bd">

          {/* Avatar preview */}
          <div style={{textAlign:"center",marginBottom:4}}>
            <div className="prof-av-preview" style={{background:f.color}}>{f.initials||"?"}</div>
            <span className="role-badge" style={{background:ROLE_COLORS[currentUser.role].bg,color:ROLE_COLORS[currentUser.role].color}}>
              {ROLE_ICONS[currentUser.role]} {currentUser.role}
            </span>
            <div style={{fontSize:11.5,color:"#9ca3af",marginTop:5}}>Role can only be changed by an Admin.</div>
          </div>

          {/* Basic Info */}
          <div className="prof-section">
            <div className="prof-section-title">Personal Information</div>
            <div className="fr2">
              <div className="fg">
                <label className="fl" htmlFor="prof-name">Full Name *</label>
                <input id="prof-name" className="fi" value={f.name} onChange={e=>set("name",e.target.value)} placeholder="Your full name"/>
                {errors.name&&<span style={{color:"#ef4444",fontSize:12}}>{errors.name}</span>}
              </div>
              <div className="fg">
                <label className="fl" htmlFor="prof-ini">Initials *</label>
                <input id="prof-ini" className="fi" value={f.initials} onChange={e=>set("initials",e.target.value.toUpperCase().slice(0,3))} placeholder="AB" maxLength={3}/>
                {errors.initials&&<span style={{color:"#ef4444",fontSize:12}}>{errors.initials}</span>}
              </div>
            </div>
            <div className="fg">
              <label className="fl" htmlFor="prof-email">Email Address *</label>
              <input id="prof-email" className="fi" type="email" value={f.email} onChange={e=>set("email",e.target.value)} placeholder="your@email.com"/>
              {errors.email&&<span style={{color:"#ef4444",fontSize:12}}>{errors.email}</span>}
            </div>
            <div className="fg">
              <label className="fl">Avatar Color</label>
              <div className="color-swatches" style={{marginTop:4}}>
                {COLOR_PALETTE.map(c=><div key={c} className="db-color-swatch" style={{background:c,width:28,height:28,outline:f.color===c?"3px solid #1a1d23":""}} onClick={()=>set("color",c)}/>)}
              </div>
            </div>
          </div>

          {/* Password change */}
          <div className="prof-section">
            <div className="prof-section-title">Change Password <span style={{fontWeight:400,textTransform:"none",letterSpacing:0,color:"#c4c9d4",fontSize:10.5}}>(leave blank to keep current)</span></div>
            <div className="fg">
              <label className="fl" htmlFor="prof-cpw">Current Password</label>
              <input id="prof-cpw" className="fi" type="password" value={f.currentPw} onChange={e=>set("currentPw",e.target.value)} placeholder="Enter current password"/>
              {errors.currentPw&&<span style={{color:"#ef4444",fontSize:12}}>{errors.currentPw}</span>}
            </div>
            <div className="fr2">
              <div className="fg">
                <label className="fl" htmlFor="prof-npw">New Password</label>
                <input id="prof-npw" className="fi" type="password" value={f.newPw} onChange={e=>set("newPw",e.target.value)} placeholder="Min. 6 characters"/>
                {f.newPw&&<div style={{background:"#f3f4f6",borderRadius:4,height:4,marginTop:5}}><div className="pw-strength" style={{width:str.w+"%",background:str.c}}/></div>}
                {f.newPw&&<span style={{fontSize:11,color:str.c,fontWeight:600}}>{str.l}</span>}
                {errors.newPw&&<span style={{color:"#ef4444",fontSize:12}}>{errors.newPw}</span>}
              </div>
              <div className="fg">
                <label className="fl" htmlFor="prof-cpw2">Confirm New</label>
                <input id="prof-cpw2" className="fi" type="password" value={f.confirmPw} onChange={e=>set("confirmPw",e.target.value)} placeholder="Repeat new password"/>
                {f.confirmPw&&f.newPw===f.confirmPw&&<span style={{fontSize:11,color:"#16a34a",fontWeight:600}}>✓ Passwords match</span>}
                {errors.confirmPw&&<span style={{color:"#ef4444",fontSize:12}}>{errors.confirmPw}</span>}
              </div>
            </div>
          </div>

        </div>
        <div className="m-ft">
          {saved&&<span style={{marginRight:"auto",color:"#16a34a",fontWeight:600,fontSize:13,display:"flex",alignItems:"center",gap:5}}>✓ Saved successfully</span>}
          <button className="btn btn-s" onClick={onClose}>Cancel</button>
          <button className="btn btn-p" onClick={submit}>Save Changes</button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════
   PUNCH REPORT MODAL  (Admin + Engineer)
════════════════════════════════ */
function PunchReportModal({tasks, users, currentUser, onClose, onOpenTask}){
  const [tab,setTab]=useState("overview");
  const [emailFilter,setEmailFilter]=useState("open"); // open | all

  useEffect(()=>{const esc=e=>{if(e.key==="Escape")onClose();};window.addEventListener("keydown",esc);return()=>window.removeEventListener("keydown",esc);},[onClose]);

  /* Punch items: tasks where attrs.punchItem === "Yes" */
  /* Rev 01 — allPunch includes items with plItemNo OR punchItem=Yes; open/closed uses attrs.punchStatus */
  const allPunch=useMemo(()=>tasks.filter(t=>(t.attrs?.punchItem||"").toLowerCase()==="yes"||t.attrs?.plItemNo),[tasks]);
  const openPunch=useMemo(()=>allPunch.filter(t=>(t.attrs?.punchStatus||"Open")!=="Closed"),[allPunch]);
  const closedPunch=useMemo(()=>allPunch.filter(t=>t.attrs?.punchStatus==="Closed"),[allPunch]);
  const overduePunch=useMemo(()=>openPunch.filter(t=>isOverdue(t.dueDate)),[openPunch]);
  const highPunch=useMemo(()=>openPunch.filter(t=>t.priority==="high"),[openPunch]);

  const emailItems = emailFilter==="open" ? openPunch : allPunch;

  /* ── EMAIL GENERATION ── */
  const recipientEmails=useMemo(()=>{
    const ids=new Set(emailItems.map(t=>t.assignee));
    return users.filter(u=>ids.has(u.id)&&u.email).map(u=>u.email);
  },[emailItems,users]);

  const emailSubject=`FieldWork — Punch Item Report — ${new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}`;

  const emailBody=useMemo(()=>{
    const lines=[
      `Punch Item Report`,
      `Generated: ${new Date().toLocaleString()}`,
      `Generated by: ${currentUser.name}`,
      ``,
      `SUMMARY`,
      `-------`,
      `Total punch items: ${allPunch.length}`,
      `Open: ${openPunch.length}`,
      `Closed / Approved: ${closedPunch.length}`,
      `Overdue: ${overduePunch.length}`,
      ``,
      `${emailFilter==="open"?"OPEN PUNCH ITEMS":"ALL PUNCH ITEMS"} (${emailItems.length})`,
      `${"─".repeat(60)}`,
    ];
    emailItems.forEach((t,i)=>{
      const person=users.find(u=>u.id===t.assignee);
      const col=COLUMNS.find(c=>c.id===t.column);
      lines.push(``,`${i+1}. [#${t.id}] ${t.title}`);
      lines.push(`   Status  : ${col?.label||t.column}`);
      lines.push(`   Priority: ${PRI[t.priority]?.label||t.priority}`);
      lines.push(`   Assignee: ${person?.name||t.assignee}`);
      if(t.dueDate) lines.push(`   Due     : ${fmtDate(t.dueDate)}${isOverdue(t.dueDate)?" ⚠ OVERDUE":""}`);
      if(t.attrs?.location) lines.push(`   Location: ${t.attrs.location}${t.attrs.roomNumber?" / "+t.attrs.roomNumber:""}`);
      if(t.attrs?.originalPunchNmbr) lines.push(`   Orig. #  : ${t.attrs.originalPunchNmbr}`);
      if(t.attrs?.responsibleContractor) lines.push(`   Contractor: ${t.attrs.responsibleContractor}`);
      if(t.description) lines.push(`   Note    : ${t.description}`);
    });
    lines.push(``);
    lines.push(`${"─".repeat(60)}`);
    lines.push(`This report was generated by FieldWork Task Management.`);
    return lines.join("\n");
  },[emailItems,allPunch,openPunch,closedPunch,overduePunch,users,emailFilter,currentUser]);

  const openMailClient=()=>{
    const to=recipientEmails.join(",");
    const uri=`mailto:${to}?subject=${encodeURIComponent(emailSubject)}&body=${encodeURIComponent(emailBody)}`;
    window.open(uri,"_blank");
  };

  const copyEmailText=()=>{
    const full=`To: ${recipientEmails.join(", ")}\nSubject: ${emailSubject}\n\n${emailBody}`;
    navigator.clipboard.writeText(full).then(()=>alert("✅ Email text copied to clipboard!")).catch(()=>{
      // Fallback
      const ta=document.createElement("textarea");ta.value=full;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
      alert("✅ Copied to clipboard!");
    });
  };

  /* ── PDF / PRINT ── */
  const printPDF=()=>{

/* ════════════════════════════════
   CREDENTIALS MODAL with invite link
════════════════════════════════ */
function CredentialsModal({creds, onClose}) {
  const [copied, setCopied] = useState(false);
  const [linkCopied, setLinkCopied] = useState(false);
  const inviteUrl = buildInviteUrl(creds);

  const copyLink = () => {
    navigator.clipboard.writeText(inviteUrl).catch(()=>{
      const ta=document.createElement("textarea");ta.value=inviteUrl;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    });
    setLinkCopied(true);
    setTimeout(()=>setLinkCopied(false), 2500);
  };

  const copyAll = () => {
    const txt = `FieldWork Login\nName: ${creds.name}\nEmail: ${creds.email}\nPassword: ${creds.plainPw||"(share separately)"}\nRole: ${creds.role}\nInvite Link: ${inviteUrl}\n\nNOTE: The invite link does NOT contain the password. Share both separately.`;
    navigator.clipboard.writeText(txt).catch(()=>{
      const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    });
    setCopied(true);
    setTimeout(()=>setCopied(false), 2500);
  };

  useEffect(()=>{const esc=e=>{if(e.key==="Escape")onClose();};window.addEventListener("keydown",esc);return()=>window.removeEventListener("keydown",esc);},[onClose]);

  return (
    <div className="modal-ov" onClick={onClose}>
      <div className="modal" style={{maxWidth:460}} onClick={e=>e.stopPropagation()}>
        <div className="m-hd">
          <h2 className="m-ht">✅ User Created</h2>
          <button className="btn btn-g btn-ic" onClick={onClose}>✕</button>
        </div>
        <div className="m-bd">
          <p style={{fontSize:13.5,color:"#6b7280"}}>
            Share the <strong>invite link</strong> below with <strong>{creds.name}</strong>.
            When they open it, their account will be set up automatically.
          </p>

          {/* HOW IT WORKS */}
          <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"12px 14px",fontSize:12.5,color:"#1d4ed8",lineHeight:1.7}}>
            <strong>How it works:</strong><br/>
            1. Send the invite link — their account will install automatically<br/>
            2. Send the <strong>password separately</strong> (message, email, phone)<br/>
            3. They open the link, then sign in with their email + password<br/>
            <span style={{color:"#6b7280",fontSize:11.5}}>🔒 The link does <strong>not</strong> contain the password — it must be shared separately.</span>
          </div>

          {/* INVITE LINK */}
          <div>
            <div className="fl" style={{marginBottom:6}}>🔗 Invite Link</div>
            <div className="invite-link-box">
              <span className="invite-link-url">{inviteUrl}</span>
              <button className={`invite-link-copy${linkCopied?" copied":""}`} onClick={copyLink}>
                {linkCopied?"✓ Copied!":"Copy Link"}
              </button>
            </div>
          </div>

          {/* CREDENTIALS */}
          <div className="invite-creds">
            <div className="invite-creds-title">Login Credentials</div>
            {[["Name",creds.name],["Email",creds.email],["Password (share separately)",creds.plainPw||"(set by user)"],["Role",creds.role]].map(([l,v])=>(
              <div key={l} className="invite-creds-row">
                <span className="invite-creds-label">{l}</span>
                <span className="invite-creds-val">{v}</span>
              </div>
            ))}
          </div>

          <p style={{fontSize:11.5,color:"#9ca3af"}}>
            ⚠️ The invite link contains login credentials — only share it with the intended person.
            Advise them to change their password after first login.
          </p>
        </div>
        <div className="m-ft">
          <button className={`btn${copied?" btn-success":" btn-s"}`} onClick={copyAll}>
            {copied?"✓ Copied!":"📋 Copy All"}
          </button>
          <button className="btn btn-p" onClick={onClose}>Done</button>
        </div>
      </div>
    </div>
  );
}

function UsersPage({users,onCreateUser,onUpdateUser,onDeleteUser,currentUser}){
  const [showInvite,setShowInvite]=useState(false);
  const [editUser,setEditUser]=useState(null);
  const [newCreds,setNewCreds]=useState(null);

  const handleCreate=async form=>{
    const hashedPw=await hashPassword(form.password);
    // Keep plainPw only for the credentials modal display (never stored in DB)
    const nu={id:form.initials.toUpperCase(),initials:form.initials.toUpperCase(),name:form.name,email:form.email,password:hashedPw,color:form.color,role:form.role,status:"active",joinedAt:new Date().toISOString().split("T")[0]};
    await onCreateUser(nu);
    setNewCreds({...nu,plainPw:form.password}); // plainPw only for one-time display
    setShowInvite(false);
  };
  const handleEdit=async form=>{await onUpdateUser({...editUser,...form});setEditUser(null);};
  const handleDeactivate=async id=>{if(!window.confirm("Deactivate this user?"))return;const u=users.find(x=>x.id===id);if(u)await onUpdateUser({...u,status:u.status==="active"?"inactive":"active"});};
  const handleDelete=async id=>{if(!window.confirm("Permanently delete this user?"))return;await onDeleteUser(id);};

  const undoTimerRef=useRef();
  const importRef=useRef();
  const saveTimer=useRef();
  const unsubsRef=useRef([]);

  /* Save indicator flash */
  const flash=useCallback(()=>{if(saveTimer.current)clearTimeout(saveTimer.current);saveTimer.current=setTimeout(()=>{setSaveFlash(true);setTimeout(()=>setSaveFlash(false),1800);},400);},[]);

  /* Restore nextId counter */
  useEffect(()=>{const s=lsGet(LS_NEXTID,null);if(s&&s>_nextId)_nextId=s;},[]);

  /* ════════════════════════════════
     FIREBASE REAL-TIME LISTENERS
  ════════════════════════════════ */
  useEffect(()=>{
    if(!fbConfig){setDataLoading(false);return;}
    setSyncErr('');
    let fs;
    try{fs=initFirebase(fbConfig);setFbReady(true);}
    catch(e){setSyncErr('Firebase init failed: '+e.message);setDataLoading(false);return;}

    let loaded={t:false,u:false,d:false,p:false};
    const chk=()=>{if(loaded.t&&loaded.u&&loaded.d&&loaded.p){clearTimeout(timeout);setDataLoading(false);flash();}};
    /* Timeout: if Firestore doesn't respond in 15s, unblock the UI */
    const timeout=setTimeout(()=>{setDataLoading(false);if(!loaded.u)setSyncErr('Connection timed out. Check Firebase config and Firestore rules.');},15000);
    const origChk=chk;

    /* Tasks */
    const u1=fs.collection('tasks').onSnapshot(snap=>{
      setTasks(snap.docs.map(d=>d.data()));
      lsSet(LS_NEXTID,_nextId);
      if(!loaded.t){loaded.t=true;chk();}else flash();
    },e=>{setSyncErr('Tasks: '+e.message);if(!loaded.t){loaded.t=true;chk();}});

    /* Users — seed INIT_USERS on first run */
    const u2=fs.collection('users').onSnapshot(snap=>{
      if(snap.empty){
        const batch=fs.batch();
        INIT_USERS.forEach(u=>batch.set(fs.collection('users').doc(u.id),u));
        batch.commit().catch(console.error);
        setUsers(INIT_USERS);
      } else {
        const us=snap.docs.map(d=>d.data());
        setUsers(us);
        /* Keep currentUser in sync if their profile changed */
        setCurrentUser(cu=>{
          if(cu) return {...us.find(u=>u.id===cu.id)||cu};
          /* Auto-restore session from localStorage */
          const savedId=lsGet(LS_SESSION_UID,null);
          if(savedId){const saved=us.find(u=>u.id===savedId&&u.status!=="inactive");if(saved)return saved;}
          return null;
        });
      }
      if(!loaded.u){loaded.u=true;chk();}
    },e=>{setSyncErr('Users: '+e.message);if(!loaded.u){loaded.u=true;chk();}});

    /* Reference DB — seed INIT_DB on first run */
    const u3=fs.doc('db/main').onSnapshot(snap=>{
      if(!snap.exists){fs.doc('db/main').set(INIT_DB).catch(console.error);setDb(INIT_DB);}
      else setDb(snap.data());
      if(!loaded.d){loaded.d=true;chk();}
    },e=>{setSyncErr('DB: '+e.message);if(!loaded.d){loaded.d=true;chk();}});

    /* Photos */
    const u4=fs.collection('photos').onSnapshot(snap=>{
      setPhotos(snap.docs.map(d=>d.data()));
      if(!loaded.p){loaded.p=true;chk();}
    },()=>{if(!loaded.p){loaded.p=true;chk();}});

    unsubsRef.current=[u1,u2,u3,u4];
    return()=>unsubsRef.current.forEach(u=>u());
  },[fbConfig]);

  /* Parse invite link on first load */
  useEffect(()=>{
    const hash=window.location.hash;
    if(!hash.startsWith('#invite='))return;
    const token=hash.slice(8);
    const inv=decodeInvite(token);
    if(!inv||!inv.email||!inv.password)return;
    if(fbReady&&getFS()){
      // Account was already created in Firestore by Admin when they invited the user.
      // Just verify it exists and show the welcome screen — no password in URL payload.
      const uid=inv.id||inv.initials;
      getFS().collection('users').doc(uid).get().then(doc=>{
        // If somehow not in Firestore yet (edge case), create without password field
        if(!doc.exists)getFS().collection('users').doc(uid).set({...inv,password:'',status:'active'}).catch(console.error);
      });
    }
    setWelcomeUser(inv);
    window.history.replaceState(null,'',window.location.pathname+window.location.search);
  },[fbReady]);

  /* ════════════════════════════════
     TASK CRUD  (Firestore writes)
  ════════════════════════════════ */
  const createTask=useCallback(async data=>{
    const fs=getFS();if(!fs)return;
    const id=genId();lsSet(LS_NEXTID,id+1);
    /* Upload any attached photos to photos collection */
    const photoIds=[];
    for(const p of (data.photos||[])){
      const pid='photo_'+Date.now()+'_'+Math.random().toString(36).slice(2);
      await fs.collection('photos').doc(pid).set({...p,id:pid,taskId:String(id)});
      photoIds.push(pid);
    }
    const nt={...data,id,photoIds,photos:undefined,createdAt:TODAY,watchers:[],checklist:data.checklist||[],relatedTasks:[],activity:[]};
    delete nt.photos;
    await fs.collection('tasks').doc(String(id)).set(nt);
    setTaskModal(null);
  },[]);

  const updateTask=useCallback(async updated=>{
    const fs=getFS();if(!fs)return;
    /* Handle any new photos that were added inline */
    const newPhotos=(updated.photos||[]).filter(p=>p.data&&!p.id?.startsWith('photo_'));
    const photoIds=[...(updated.photoIds||[])];
    for(const p of newPhotos){
      const pid='photo_'+Date.now()+'_'+Math.random().toString(36).slice(2);
      await fs.collection('photos').doc(pid).set({...p,id:pid,taskId:String(updated.id)});
      photoIds.push(pid);
    }
    const clean={...updated,photoIds,photos:undefined};delete clean.photos;
    await fs.collection('tasks').doc(String(updated.id)).set(clean);
    if(detailTask?.id===updated.id)setDetailTask({...clean,photoIds});
  },[detailTask]);

  const deleteTask=useCallback(async id=>{
    const fs=getFS();if(!fs)return;
    /* Delete task's photos */
    const task=tasks.find(t=>t.id===id);
    if(task?.photoIds?.length){
      const b=fs.batch();
      task.photoIds.forEach(pid=>b.delete(fs.collection('photos').doc(pid)));
      await b.commit();
    }
    await fs.collection('tasks').doc(String(id)).delete();
    setTaskModal(null);setDetailTask(null);
  },[tasks]);

  const moveTask=useCallback(async(taskId,toColumn)=>{
    const fs=getFS();if(!fs)return;
    const task=tasks.find(t=>t.id===taskId);
    const fromColumn=task?.column;
    if(!fromColumn||fromColumn===toColumn)return;
    /* Optimistic local update for instant UX */
    setTasks(prev=>prev.map(t=>t.id===taskId?{...t,column:toColumn}:t));
    await fs.collection('tasks').doc(String(taskId)).update({column:toColumn});
    setUndoStack(p=>[...p,{taskId,fromColumn,toColumn}]);
    const label=COLUMNS.find(c=>c.id===toColumn)?.label||toColumn;
    if(undoTimerRef.current)clearTimeout(undoTimerRef.current);
    setUndoToast(label);
    undoTimerRef.current=setTimeout(()=>setUndoToast(null),5000);
  },[tasks]);

  const undoMove=useCallback(async()=>{
    if(!undoStack.length)return;
    const last=undoStack[undoStack.length-1];
    const fs=getFS();if(!fs)return;
    setTasks(ts=>ts.map(t=>t.id===last.taskId?{...t,column:last.fromColumn}:t));
    await fs.collection('tasks').doc(String(last.taskId)).update({column:last.fromColumn});
    setUndoStack(p=>p.slice(0,-1));
    clearTimeout(undoTimerRef.current);setUndoToast(null);
  },[undoStack]);

  /* ════════════════════════════════
     USER CRUD  (Firestore writes)
  ════════════════════════════════ */
  const fsCreateUser=useCallback(async user=>{
    const fs=getFS();if(!fs)return;
    await fs.collection('users').doc(user.id).set(user);
  },[]);
  const fsUpdateUser=useCallback(async user=>{
    const fs=getFS();if(!fs)return;
    await fs.collection('users').doc(user.id).set(user);
  },[]);
  const fsDeleteUser=useCallback(async id=>{
    const fs=getFS();if(!fs)return;
    await fs.collection('users').doc(String(id)).delete();
  },[]);

  /* ════════════════════════════════
     DB CRUD  (Firestore writes)
  ════════════════════════════════ */
  const fsUpdateDb=useCallback(async updater=>{
    const fs=getFS();if(!fs)return;
    setDb(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      fs.doc('db/main').set(next).catch(console.error);
      return next;
    });
  },[]);

  /* ════════════════════════════════
     PHOTO DELETE
  ════════════════════════════════ */
  const fsDeletePhoto=useCallback(async(photoId,taskId)=>{
    const fs=getFS();if(!fs)return;
    await fs.collection('photos').doc(photoId).delete();
    await fs.collection('tasks').doc(String(taskId)).update({
      photoIds: firebase.firestore.FieldValue.arrayRemove(photoId)
    });
  },[]);

  /* ════════════════════════════════
     FULL DATA RESET  (Admin only)
  ════════════════════════════════ */
  const handleReset=async()=>{
    if(!window.confirm("Clear ALL Firestore tasks and photos?\nUsers are kept. This is permanent and affects ALL users.")) return;
    const fs=getFS();if(!fs)return;
    try{
      const deleteCol=async col=>{const s=await fs.collection(col).get();const b=fs.batch();s.docs.forEach(d=>b.delete(d.ref));await b.commit();};
      /* Rev 01 — reset to empty, no seed data */
      await deleteCol('tasks');await deleteCol('photos');
      _nextId=1001;lsSet(LS_NEXTID,1001);
      setActiveNav("home");
    }catch(e){alert('Reset failed: '+e.message);}
  };


  /* ════════════════════════════════
     DERIVED / COMPUTED STATE
  ════════════════════════════════ */
  const filteredTasks=useMemo(()=>{
    let res=[...tasks];
    if(activeNav==="my-tasks")res=res.filter(t=>t.assignee===currentUser?.id);
    else if(activeNav==="watched")res=res.filter(t=>(t.watchers||[]).includes(currentUser?.id));
    if(search){const q=search.toLowerCase();res=res.filter(t=>t.title.toLowerCase().includes(q)||t.description?.toLowerCase().includes(q)||String(t.id).includes(q)||(t.attrs?.plItemNo||"").toLowerCase().includes(q)||(t.attrs?.description1||"").toLowerCase().includes(q));}
    if(filters.assignee)res=res.filter(t=>t.assignee===filters.assignee);
    if(filters.priority)res=res.filter(t=>t.priority===filters.priority);
    if(filters.column)res=res.filter(t=>t.column===filters.column);
    if(filters.overdue)res=res.filter(t=>isOverdue(t.dueDate));
    /* Rev 01 — punchStatus filter and room filter */
    if(filters.punchStatus)res=res.filter(t=>(t.attrs?.punchStatus||"Open")===filters.punchStatus);
    if(roomFilter)res=res.filter(t=>t.attrs?.roomNumber===roomFilter);
    res.sort((a,b)=>{let av,bv;switch(sort.field){case"id":av=a.id;bv=b.id;break;case"title":av=a.title;bv=b.title;break;case"dueDate":av=a.dueDate||"9999";bv=b.dueDate||"9999";break;case"priority":{const p={high:0,medium:1,low:2};av=p[a.priority];bv=p[b.priority];break;}default:av=a.assignee;bv=b.assignee;}return sort.dir==="asc"?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);});
    return res;
  },[tasks,activeNav,search,filters,sort,currentUser,roomFilter]);

  const tasksByColumn=useMemo(()=>{const m={};COLUMNS.forEach(c=>{m[c.id]=[]});filteredTasks.forEach(t=>{if(m[t.column])m[t.column].push(t)});return m;},[filteredTasks]);
  const visibleColumns=useMemo(()=>showEmptyColumns?COLUMNS:COLUMNS.filter(c=>(tasksByColumn[c.id]?.length||0)>0),[showEmptyColumns,tasksByColumn]);
  const counts=useMemo(()=>({mine:tasks.filter(t=>t.assignee===currentUser?.id).length,watched:tasks.filter(t=>(t.watchers||[]).includes(currentUser?.id)).length,all:tasks.length}),[tasks,currentUser]);
  const activeFilterCount=Object.keys(filters).length+(search?1:0);
  const SORT_OPTIONS=[{field:"id",label:"Task ID"},{field:"title",label:"Title"},{field:"dueDate",label:"Due Date"},{field:"priority",label:"Priority"},{field:"assignee",label:"Assignee"}];
  const sortLabel=SORT_OPTIONS.find(o=>o.field===sort.field)?.label||"Sort";

  const handleDragStart=useCallback((e,id)=>{if(!can(currentUser,"drag_task"))return;setDraggingId(id);e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain",String(id));},[currentUser]);
  const handleDragEnd=useCallback(()=>{setDraggingId(null);setDragOverCol(null);},[]);
  const handleDragOver=useCallback((e,colId)=>{e.preventDefault();e.dataTransfer.dropEffect="move";setDragOverCol(colId);},[]);
  const handleDragLeave=useCallback(()=>setDragOverCol(null),[]);
  const handleDrop=useCallback((e,colId)=>{e.preventDefault();const id=parseInt(e.dataTransfer.getData("text/plain"));if(id&&can(currentUser,"drag_task"))moveTask(id,colId);setDraggingId(null);setDragOverCol(null);},[moveTask,currentUser]);

  const addFilter=(k,v)=>setFilters(f=>({...f,[k]:v}));
  const removeFilter=k=>setFilters(f=>{const n={...f};delete n[k];return n;});
  const clearFilters=()=>setFilters({});
  const toggleSort=field=>{setSort(s=>s.field===field?{field,dir:s.dir==="asc"?"desc":"asc"}:{field,dir:"asc"});setShowSortMenu(false);};

  const handleExport=()=>{
    const hdrs=["id","title","description","column","assignee","priority","dueDate"];
    const rows=filteredTasks.map(t=>hdrs.map(h=>`"${String(t[h]||"").replace(/"/g,'""')}"`).join(","));
    const csv=[hdrs.join(","),...rows].join("\n");
    const url=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    const a=document.createElement("a");a.href=url;a.download="fieldwork-tasks.csv";a.click();URL.revokeObjectURL(url);
  };

  const handleImportTasks=e=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      const fs=getFS();if(!fs)return;
      const lines=ev.target.result.split("\n").filter(Boolean);
      const headers=lines[0].split(",").map(h=>sanitize(h.replace(/^"|"$/g,"")));
      const imported=lines.slice(1).map(line=>{const vals=line.split(",").map(v=>sanitize(v.replace(/^"|"$/g,"")));const o={};headers.forEach((h,i)=>{o[h]=vals[i]||""});const id=genId();return{id,title:o.title||"Imported",description:o.description||"",column:COLUMNS.find(c=>c.id===o.column||c.label===o.column)?.id||"cat-a",assignee:users.find(u=>u.id===o.assignee)?o.assignee:currentUser.id,priority:["high","medium","low"].includes(o.priority)?o.priority:"medium",dueDate:o.dueDate||"",createdAt:TODAY,watchers:[],photoIds:[],attrs:mkAttrs(),checklist:[],relatedTasks:[],activity:[]};}).filter(t=>t.title);
      if(imported.length>0){
        const batch=fs.batch();
        imported.forEach(t=>batch.set(fs.collection('tasks').doc(String(t.id)),t));
        await batch.commit();
        alert(`✅ Imported ${imported.length} tasks`);
        lsSet(LS_NEXTID,_nextId);
      }
    };
    reader.readAsText(file);e.target.value="";
  };

  const filterChipLabel=(k,v)=>{if(k==="assignee"){const p=users.find(x=>x.id===v);return`Assignee: ${p?.name||v}`;}if(k==="priority")return`Priority: ${PRI[v]?.label||v}`;if(k==="column")return`Status: ${COLUMNS.find(c=>c.id===v)?.label||v}`;if(k==="overdue")return"Overdue only";if(k==="punchStatus")return`Punch: ${v}`;return`${k}: ${v}`;};

  /* Rev 01 — XLSX smart import: match on plItemNo, preserve photos+punchStatus */
  const handleXlsxImport=useCallback(async(rows,results)=>{
    const fs=getFS();if(!fs){alert("Firebase not connected.");return;}
    const added=[],updated=[],unchanged=[];
    const batch=fs.batch();
    for(const row of rows){
      const existing=tasks.find(t=>t.attrs?.plItemNo&&String(t.attrs.plItemNo)===String(row.plItemNo));
      if(existing){
        const changed=existing.attrs?.description1!==row.description1||
          existing.attrs?.tagNo!==row.tagNo||existing.attrs?.description2!==row.description2||
          existing.attrs?.plCat!==row.plCat||existing.attrs?.roomNumber!==row.room;
        if(changed){
          const ut={...existing,attrs:{...existing.attrs,
            description1:row.description1||existing.attrs.description1||"",
            tagNo:row.tagNo||existing.attrs.tagNo||"",
            description2:row.description2||existing.attrs.description2||"",
            plCat:row.plCat||existing.attrs.plCat||"",
            roomNumber:row.room||existing.attrs.roomNumber||"",
            /* PRESERVE punchStatus, notes, photos — never overwrite from import */
          }};
          batch.set(fs.collection('tasks').doc(String(existing.id)),ut);
          updated.push(ut);
        }else{unchanged.push(existing);}
      }else{
        const id=genId();
        const nt={id,title:row.description1||row.plItemNo||"Imported Item",
          description:"",column:COLUMNS[0].id,assignee:currentUser.id,
          priority:"medium",dueDate:"",createdAt:TODAY,watchers:[],photoIds:[],
          attrs:mkAttrs({plItemNo:row.plItemNo||"",description1:row.description1||"",
            tagNo:row.tagNo||"",description2:row.description2||"",plCat:row.plCat||"",
            roomNumber:row.room||"",originalStatus:row.status||"Open",punchStatus:"Open"}),
          checklist:[],relatedTasks:[],activity:[]};
        batch.set(fs.collection('tasks').doc(String(id)),nt);
        added.push(nt);
      }
    }
    await batch.commit();
    lsSet(LS_NEXTID,_nextId);
    results.added.push(...added);
    results.updated.push(...updated);
    results.unchanged.push(...unchanged);
  },[tasks,currentUser]);

  const NAV_LABELS={"home":"Home","rooms":"Rooms","my-tasks":"My Tasks","watched":"Watched Tasks","all":"All Tasks","photos":"Photos","database":"Database","users":"Users"};
  const isSpecialPage=["database","users","photos","home","rooms"].includes(activeNav);

  /* Show setup screen if Firebase not configured */
  if(!fbConfig) return <SetupScreen onSave={cfg=>{setFbConfig(cfg);lsSet(LS_FB_CONFIG,cfg);}}/>;
  /* Show loading screen while Firestore data loads */
  if(dataLoading) return <LoadingScreen msg={syncErr||"Connecting to Firestore…"}/>;
  /* Show sync error persistently if severe */
  if(syncErr&&!dataLoading&&!users.length) return <LoadingScreen msg={"⚠️ "+syncErr+" — Check your Firebase config."}/>;
  if(!currentUser && welcomeUser) return <WelcomePage user={welcomeUser} onContinue={()=>setWelcomeUser(null)}/>;
  if(!currentUser) return <LoginPage users={users} onLogin={u=>{
    const fresh=users.find(x=>x.id===u.id)||u;
    if(fresh.status==="invited"){
      const activated={...fresh,status:"active"};
      const fs=getFS();if(fs)fs.collection('users').doc(activated.id).update({status:"active"}).catch(console.error);
      lsSet(LS_SESSION_UID,activated.id);
      setCurrentUser(activated);
    } else {
      lsSet(LS_SESSION_UID,fresh.id);
      setCurrentUser(fresh);
    }
  }}/>;


  return(
    <>
      <div className="fw-app">
        <Sidebar open={sidebarOpen} activeNav={activeNav} setActiveNav={setActiveNav} counts={counts} currentUser={currentUser} onLogout={()=>{lsSet(LS_SESSION_UID,null);setCurrentUser(null);}} onEditProfile={()=>setShowProfile(true)} onClose={()=>setSidebarOpen(false)}/>
        <main className="fw-main">
          {/* TOP BAR */}
          <header className="fw-tb">
            <div className="tb-l">
              <button className="hmbgr" onClick={()=>setSidebarOpen(s=>!s)} aria-label="Toggle sidebar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
              </button>
              <nav className="bc" aria-label="Breadcrumb">
                <span className="d-only">Business Plan</span><span className="bc-s d-only">›</span>
                <span className="d-only">{isSpecialPage?"Settings":"Tasks"}</span><span className="bc-s d-only">›</span>
                <span className="bc-c">{NAV_LABELS[activeNav]||activeNav}</span>
              </nav>
            </div>
            {!isSpecialPage&&<div className="tb-l d-only" style={{maxWidth:220}}><div className="tb-srch" role="search"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search tasks…" type="search"/></div></div>}
            <div className="tb-r">
              {!isSpecialPage&&can(currentUser,"create_task")&&<button className="btn btn-p" onClick={()=>setTaskModal({mode:"create",task:{},defaultColumn:COLUMNS[0].id})}>＋ <span className="d-only">New Task</span></button>}
              {!isSpecialPage&&<>
                <div style={{position:"relative"}} ref={sortMenuRef}>
                  <button className="btn btn-s" onClick={()=>setShowSortMenu(s=>!s)}>↕ <span className="d-only">{sortLabel} {sort.dir==="asc"?"↑":"↓"}</span></button>
                  {showSortMenu&&<div className="sort-menu">{SORT_OPTIONS.map(o=><div key={o.field} className={`so${sort.field===o.field?" act":""}`} onClick={()=>toggleSort(o.field)} tabIndex={0} onKeyDown={e=>{if(e.key==="Enter")toggleSort(o.field);}}>{o.label}{sort.field===o.field&&<span>{sort.dir==="asc"?"↑":"↓"}</span>}</div>)}</div>}
                </div>
                <button className="btn btn-s" onClick={()=>setShowFilterPanel(true)} aria-label="Filters">⊞ <span className="d-only">Filters</span>{activeFilterCount>0&&<span className="fbadge">{activeFilterCount}</span>}</button>
                <div className="vt d-only">{[["board","⊞ Board"],["list","≡ List"],["calendar","📅 Cal"]].map(([v,l])=><button key={v} className={`vt-b${view===v?" act":""}`} onClick={()=>setView(v)}>{l}</button>)}</div>
                {view==="board"&&<button className="btn btn-g d-only" onClick={()=>setShowEmptyColumns(s=>!s)} title={showEmptyColumns?"Hide empty":"Show empty"}>{showEmptyColumns?"⊡":"⊞"}</button>}
                {can(currentUser,"create_task")&&<><input ref={importRef} type="file" accept=".csv" style={{display:"none"}} onChange={handleImportTasks}/><button className="btn btn-g btn-ic d-only" onClick={()=>importRef.current?.click()} title="Import tasks CSV">⬆</button></>}
                <button className="btn btn-g btn-ic d-only" onClick={handleExport} title="Export CSV">⬇</button>
                {(can(currentUser,"create_task"))&&<button className="btn btn-s d-only" onClick={()=>setShowPunchReport(true)} title="Punch item report" style={{gap:5}}>📋 <span className="d-only">Punch Report</span></button>}
              </>}
              {fbReady&&<span className="d-only" style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#6b7280"}} title="Live — syncing with cloud"><span className="sync-dot"/><span style={{fontSize:11}}>Live</span></span>}{syncErr&&<span className="sync-err d-only" title={syncErr}>⚠️ Sync error</span>}
              {can(currentUser,"manage_db")&&<button className="btn btn-g btn-ic d-only" onClick={handleReset} title="Reset all data to demo state" style={{color:"#ef4444"}}>↺</button>}
              <div className="u-av" style={{background:currentUser.color,cursor:"pointer"}} title={`${currentUser.name} — Edit Profile`} onClick={()=>setShowProfile(true)} role="button" aria-label="Edit profile">{currentUser.initials}</div>
            </div>
          </header>

          {/* SPECIAL PAGES */}
          {/* Rev 01 — Home Screen */}
          {activeNav==="home"&&<HomeScreen tasks={tasks} photos={photos} currentUser={currentUser}
            onNavigate={(nav,f)=>{setActiveNav(nav);if(f?.punchStatus)addFilter("punchStatus",f.punchStatus);if(f?.search)setSearch(f.search);}}
            onImportXlsx={()=>setShowXlsxImport(true)}
            onExportPhotos={()=>setShowPhotoExport(true)}
            onPunchReport={()=>setShowPunchReport(true)}/>}
          {/* Rev 01 — Room List Screen */}
          {activeNav==="rooms"&&<RoomListScreen tasks={tasks} onRoomSelect={room=>{setRoomFilter(room);setActiveNav("all");}}/>}
          {activeNav==="database"&&(can(currentUser,"manage_db")?<DatabasePage db={db} setDb={fsUpdateDb} tasks={tasks} onTaskClick={setDetailTask} users={users}/>:<div className="access-denied"><div className="access-denied-icon">🔒</div><h2>Access Restricted</h2><p>Database management is available to Admins only.</p></div>)}
          {activeNav==="users"&&(can(currentUser,"manage_users")?<UsersPage users={users} onCreateUser={fsCreateUser} onUpdateUser={fsUpdateUser} onDeleteUser={fsDeleteUser} currentUser={currentUser}/>:<div className="access-denied"><div className="access-denied-icon">🔒</div><h2>Access Restricted</h2><p>User management is available to Admins only.</p></div>)}
          {activeNav==="photos"&&<PhotosPage tasks={tasks} photos={photos} onTaskClick={setDetailTask} currentUser={currentUser} onDeletePhoto={fsDeletePhoto}/>}

          {/* TASK PAGES */}
          {!isSpecialPage&&<>
            <div className="fw-legend d-only">
              <span className="leg-title">Legend:</span>
              {COLUMNS.map(c=><span key={c.id} className="leg-item"><span className="leg-dot" style={{background:COL_COLORS[c.id]}}/>{c.label}</span>)}
              <span className="leg-item" style={{marginLeft:6}}><span style={{width:3,height:14,background:"#ef4444",borderRadius:2,display:"inline-block",marginRight:3}}/>Overdue</span>
            </div>
            <div className="fw-fb">
              <div className="tb-srch m-only" style={{flex:1,maxWidth:"100%",marginRight:4}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search tasks…" type="search" style={{fontSize:16}}/></div>
              {Object.entries(filters).map(([k,v])=><span key={k} className="f-chip">{filterChipLabel(k,v)}<button className="f-chip-x" onClick={()=>removeFilter(k)}>×</button></span>)}
              {roomFilter&&<span className="f-chip">🚪 Room: {roomFilter}<button className="f-chip-x" onClick={()=>setRoomFilter(null)}>×</button></span>}
              {search&&<span className="f-chip">"{search}"<button className="f-chip-x" onClick={()=>setSearch("")}>×</button></span>}
              {activeFilterCount>1&&<button className="clear-all" onClick={()=>{clearFilters();setSearch("");}}>Clear all</button>}
              <span className="stat-info">{filteredTasks.length}/{tasks.length} tasks</span>
            </div>
            {view==="board"&&<div className="mob-cs m-only" role="tablist" aria-label="Column">{visibleColumns.map(col=>{const cnt=tasksByColumn[col.id]?.length||0,color=COL_COLORS[col.id]||"#6b7280",active=mobileCol===col.id;return<button key={col.id} className="mob-pill" role="tab" aria-selected={active} onClick={()=>setMobileCol(col.id)} style={{borderColor:color,background:active?color:"#fff",color:active?"#fff":color,minHeight:38}}><span style={{fontWeight:700}}>{col.label}</span><span style={{marginLeft:5,opacity:.7,fontWeight:400,fontSize:11}}>({cnt})</span></button>;})}</div>}

            {view==="board"&&<BoardView columns={visibleColumns} tasksByColumn={tasksByColumn} draggingId={draggingId} dragOverCol={dragOverCol} mobileCol={mobileCol} onDragStart={handleDragStart} onDragEnd={handleDragEnd} onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop} onTaskClick={setDetailTask} onAddTask={colId=>can(currentUser,"create_task")&&setTaskModal({mode:"create",task:{},defaultColumn:colId})} onMoveTask={moveTask} currentUser={currentUser} users={users}/>}
            {view==="list"&&<ListView tasks={filteredTasks} sort={sort} toggleSort={toggleSort} onTaskClick={setDetailTask} users={users}/>}
            {view==="calendar"&&<CalendarView tasks={filteredTasks} calMonth={calMonth} setCalMonth={setCalMonth} onTaskClick={setDetailTask}/>}
          </>}
        </main>
      </div>

      {/* ── MOBILE BOTTOM NAV ── */}
      <nav className="mob-bottom-nav" aria-label="Mobile navigation">
        <div className="mob-nav-bar">
          {[
            {id:"home",label:"Home",icon:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>},
            {id:"rooms",label:"Rooms",icon:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><rect x="9" y="12" width="6" height="9"/></svg>},
            {id:"all",label:"All",icon:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>},
            {id:"photos",label:"Photos",icon:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>},
            {id:"__menu",label:"Menu",icon:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>},
          ].map(item=>(
            <button key={item.id} className={`mob-nav-btn${activeNav===item.id?" act":""}`}
              onClick={()=>{
                if(item.id==="__menu"){setSidebarOpen(s=>!s);}
                else{setActiveNav(item.id);}
              }}>
              {item.icon}
              <span>{item.label}</span>
            </button>
          ))}
        </div>
      </nav>

      {/* ── MOBILE FAB ── */}
      {can(currentUser,"create_task")&&(
        <button className="mob-fab" aria-label="New task"
          onClick={()=>setTaskModal({mode:"create",task:{},defaultColumn:COLUMNS[0].id})}>
          ＋
        </button>
      )}

      {/* TASK DETAIL PANEL */}
      {detailTask&&<TaskDetailPanel task={detailTask} onClose={()=>setDetailTask(null)} onUpdate={updateTask} onDelete={()=>deleteTask(detailTask.id)} tasks={tasks} db={db} users={users} currentUser={currentUser} photos={photos.filter(p=>p.taskId===String(detailTask.id))} onDeletePhoto={(pid)=>fsDeletePhoto(pid,detailTask.id)}/>}

      {/* TASK FORM MODAL */}
      {taskModal&&<TaskForm mode={taskModal.mode} task={taskModal.task} onSave={createTask} onDelete={null} onClose={()=>setTaskModal(null)} db={db} users={users} currentUser={currentUser} defaultColumn={taskModal.defaultColumn}/>}

      {/* UNDO TOAST */}
      {undoToast&&<div className="fw-toast"><span>Moved to <strong>{undoToast}</strong></span><button className="undo-b" onClick={undoMove}>Undo</button><button className="undo-b" style={{background:"none",opacity:.6}} onClick={()=>setUndoToast(null)}>✕</button></div>}

      {/* FILTER PANEL */}
      {showFilterPanel&&<FilterPanel filters={filters} addFilter={addFilter} removeFilter={removeFilter} clearFilters={clearFilters} onClose={()=>setShowFilterPanel(false)} columns={COLUMNS} users={users}/>}

      {/* PROFILE MODAL */}
      {showProfile&&<ProfileModal currentUser={currentUser} users={users} onUpdateUser={async updated=>{await fsUpdateUser(updated);setCurrentUser(updated);}} onClose={()=>setShowProfile(false)}/>}

      {/* PUNCH REPORT MODAL */}
      {showPunchReport&&<PunchReportModal tasks={tasks} users={users} currentUser={currentUser} onClose={()=>setShowPunchReport(false)} onOpenTask={t=>{setDetailTask(t);setShowPunchReport(false);}}/>}

      {/* Rev 01 — XLSX IMPORT MODAL */}
      {showXlsxImport&&<XlsxImportModal tasks={tasks} onImport={handleXlsxImport} onClose={()=>setShowXlsxImport(false)}/>}

      {/* Rev 01 — PHOTO EXPORT MODAL */}
      {showPhotoExport&&<PhotoExportModal tasks={tasks} photos={photos} onClose={()=>setShowPhotoExport(false)}/>}
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
