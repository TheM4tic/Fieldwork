<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;font-family:'Figtree',sans-serif;}
body{background:#eef0f6;color:#1a1d23;}
:focus-visible{outline:2px solid #2563eb;outline-offset:2px;border-radius:3px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:10px;}

/* ── LOGIN ── */
.login-page{min-height:100vh;background:linear-gradient(135deg,#0e1118 0%,#1e2434 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:#fff;border-radius:20px;padding:40px 44px;width:100%;max-width:400px;box-shadow:0 30px 80px rgba(0,0,0,.4);}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;}
.login-logo-ic{width:40px;height:40px;background:#2563eb;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.login-logo-tx{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.03em;}
.login-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;margin-bottom:6px;}
.login-sub{font-size:14px;color:#9ca3af;margin-bottom:28px;}
.login-err{background:#fef2f2;border:1px solid #fecaca;color:#ef4444;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;}
.login-role-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:6px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}

/* ── SHELL ── */
.fw-app{display:flex;height:100vh;overflow:hidden;}
/* ── SIDEBAR ── */
.fw-sb{width:224px;min-width:224px;background:#0e1118;display:flex;flex-direction:column;overflow:hidden;transition:width .25s,min-width .25s;flex-shrink:0;z-index:300;}
.fw-sb.closed{width:0;min-width:0;}
.sb-logo{padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;white-space:nowrap;flex-shrink:0;}
.sb-logo-ic{width:32px;height:32px;background:#2563eb;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-logo-tx{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#fff;letter-spacing:-.03em;}
.sb-nav{overflow-y:auto;flex:1;padding:6px 10px;}
.sb-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.28);padding:14px 10px 5px;white-space:nowrap;}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.55);font-size:13.5px;font-weight:500;transition:all .15s;white-space:nowrap;background:none;border:none;width:100%;text-align:left;font-family:'Figtree',sans-serif;}
.sb-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9);}
.sb-item.act{background:rgba(37,99,235,.25);color:#60a5fa;}
.sb-item.disabled{opacity:.3;cursor:not-allowed;pointer-events:none;}
.sb-badge{margin-left:auto;background:rgba(255,255,255,.1);color:rgba(255,255,255,.45);font-size:11px;font-weight:600;padding:1px 7px;border-radius:10px;font-family:'JetBrains Mono',monospace;}
.sb-item.act .sb-badge{background:rgba(37,99,235,.4);color:#93c5fd;}
.sb-foot{padding:12px 10px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.sb-user{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:6px;transition:background .15s;}.sb-user:hover{background:rgba(255,255,255,.07);cursor:pointer;}
.sb-user-av{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0;}
.sb-user-info{flex:1;min-width:0;}
.sb-user-name{font-size:12.5px;color:rgba(255,255,255,.8);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-user-role{font-size:10.5px;color:rgba(255,255,255,.35);text-transform:capitalize;}
.sb-logout{background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;flex-shrink:0;}
.sb-logout:hover{color:rgba(255,255,255,.7);background:rgba(255,255,255,.07);}
.sb-fbtns{display:flex;gap:4px;}
.sb-fb{flex:1;padding:8px;border-radius:8px;background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:14px;}
.sb-fb:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);}
/* ── MAIN ── */
.fw-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
/* ── TOP BAR ── */
.fw-tb{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 20px;display:flex;align-items:center;gap:8px;height:56px;flex-shrink:0;}
.tb-l{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.tb-r{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.hmbgr{background:none;border:none;padding:6px;cursor:pointer;color:#6b7280;border-radius:6px;display:flex;align-items:center;transition:all .15s;}
.hmbgr:hover{background:#f3f4f6;color:#1a1d23;}
.bc{font-size:13px;color:#9ca3af;display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;min-width:0;}
.bc-s{color:#d1d5db;}
.bc-c{color:#1a1d23;font-weight:600;}
.tb-srch{display:flex;align-items:center;gap:7px;background:#f6f8fc;border:1.5px solid #e9ebee;border-radius:8px;padding:6px 11px;transition:all .15s;max-width:220px;flex:1;min-width:0;}
.tb-srch:focus-within{background:#fff;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.tb-srch input{background:none;border:none;outline:none;font-size:13px;font-family:'Figtree',sans-serif;color:#1a1d23;width:100%;}
.tb-srch input::placeholder{color:#9ca3af;}
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:'Figtree',sans-serif;white-space:nowrap;line-height:1.2;}
.btn-p{background:#2563eb;color:#fff;}
.btn-p:hover{background:#1d4ed8;}
.btn-s{background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;}
.btn-s:hover{background:#eaecf0;}
.btn-g{background:none;color:#6b7280;border:1px solid transparent;padding:7px 10px;}
.btn-g:hover{background:#f3f4f6;color:#374151;}
.btn-ic{padding:7px;}
.btn-del{background:#fef2f2;color:#ef4444;border:1px solid #fecaca;}
.btn-del:hover{background:#fee2e2;}
.btn-success{background:#dcfce7;color:#16a34a;border:1px solid #bbf7d0;}
.btn-warn{background:#fffbeb;color:#d97706;border:1px solid #fde68a;}
.fbadge{background:#2563eb;color:#fff;font-size:10px;font-weight:700;width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;}
.vt{display:flex;background:#f3f4f6;border-radius:8px;padding:3px;gap:2px;}
.vt-b{padding:5px 10px;border-radius:6px;background:none;border:none;cursor:pointer;color:#6b7280;font-size:12.5px;font-weight:600;transition:all .15s;font-family:'Figtree',sans-serif;display:flex;align-items:center;gap:4px;}
.vt-b.act{background:#fff;color:#1a1d23;box-shadow:0 1px 3px rgba(0,0,0,.1);}
.notif{position:relative;background:none;border:none;cursor:pointer;color:#6b7280;padding:7px;border-radius:8px;display:flex;align-items:center;transition:all .15s;}
.notif:hover{background:#f3f4f6;}
.notif-dot{position:absolute;top:3px;right:3px;background:#ef4444;color:#fff;font-size:9px;font-weight:700;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
.save-flash{display:flex;align-items:center;gap:4px;font-size:11.5px;color:#16a34a;font-weight:600;padding:3px 8px;background:#dcfce7;border-radius:6px;animation:fadeIn .2s ease;white-space:nowrap;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.u-av{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;position:relative;}
.u-av-role{position:absolute;bottom:-3px;right:-3px;width:12px;height:12px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:7px;}
/* ── LEGEND ── */
.fw-legend{display:flex;gap:14px;padding:6px 20px;background:#fff;border-bottom:1px solid #f0f2f7;flex-wrap:wrap;flex-shrink:0;align-items:center;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11.5px;color:#6b7280;}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.leg-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#c4c9d4;margin-right:4px;}
/* ── FILTER BAR ── */
.fw-fb{background:#fff;border-bottom:1px solid #eaecf0;padding:0 20px;display:flex;align-items:center;gap:7px;min-height:42px;flex-wrap:wrap;flex-shrink:0;}
.f-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;border-radius:6px;font-size:12px;font-weight:600;}
.f-chip-x{background:none;border:none;cursor:pointer;color:#3b82f6;padding:0;display:flex;align-items:center;font-size:16px;line-height:1;}
.stat-info{font-size:12px;color:#9ca3af;margin-left:auto;white-space:nowrap;font-family:'JetBrains Mono',monospace;}
.clear-all{font-size:12px;color:#ef4444;background:none;border:none;cursor:pointer;font-weight:600;font-family:'Figtree',sans-serif;}
/* ── BOARD ── */
.mob-cs{display:none;padding:8px 14px;background:#fff;border-bottom:1px solid #e5e7eb;overflow-x:auto;gap:6px;flex-shrink:0;}
.mob-pill{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid;white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:'Figtree',sans-serif;}
.fw-board{flex:1;overflow-x:auto;overflow-y:hidden;padding:14px 20px;display:flex;gap:10px;align-items:flex-start;}
.fw-col{flex-shrink:0;width:262px;display:flex;flex-direction:column;background:#f4f6fb;border-radius:12px;overflow:hidden;border:2px solid transparent;transition:border-color .15s,background .15s;max-height:100%;}
.fw-col.dov{background:#eff6ff;}
.col-hd{padding:11px 13px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #e8eaf0;flex-shrink:0;}
.col-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.col-title{font-size:12.5px;font-weight:700;color:#1a1d23;flex:1;font-family:'Syne',sans-serif;}
.col-cnt{background:#e2e5ed;color:#6b7280;font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;font-family:'JetBrains Mono',monospace;}
.col-body{padding:8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:7px;min-height:60px;}
.col-add{display:flex;align-items:center;gap:6px;padding:7px 8px;background:none;border:1.5px dashed #ced1db;border-radius:8px;cursor:pointer;color:#9ca3af;font-size:12.5px;font-weight:600;width:100%;transition:all .15s;flex-shrink:0;font-family:'Figtree',sans-serif;margin-top:2px;}
.col-add:hover{border-color:#2563eb;color:#2563eb;background:#eff6ff;}
.col-add.disabled{opacity:.4;cursor:not-allowed;pointer-events:none;}
.col-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px 12px;text-align:center;color:#c4c9d4;gap:5px;}
.col-empty-txt{font-size:11.5px;font-weight:500;line-height:1.5;}
/* ── TASK CARD ── */
.tc{background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);cursor:pointer;border:1.5px solid #eef0f6;transition:box-shadow .15s,border-color .15s;user-select:none;position:relative;}
.tc:hover{box-shadow:0 4px 14px rgba(0,0,0,.1);border-color:#e0e3ea;}
.tc.dragging{opacity:.35;cursor:grabbing;}
.tc.overdue{border-left:3px solid #ef4444;}
.tc-handle{position:absolute;top:10px;right:8px;color:#d1d5db;opacity:0;transition:opacity .15s;font-size:14px;pointer-events:none;}
.tc:hover .tc-handle{opacity:1;}
.tc-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:#b0b6c2;margin-bottom:4px;}
.tc-title{font-size:13.5px;font-weight:600;color:#1a1d23;margin-bottom:4px;line-height:1.4;}
.tc-desc{font-size:12px;color:#7c8494;line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tc-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.tc-pri{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:3px;}
.tc-due{font-size:11px;color:#9ca3af;display:flex;align-items:center;gap:2px;}
.tc-due.late{color:#ef4444;font-weight:700;}
.tc-av{width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;margin-left:auto;flex-shrink:0;position:relative;}
.tc-av-tip{position:absolute;bottom:calc(100%+4px);right:0;background:#1a1d23;color:#fff;font-size:11px;padding:4px 8px;border-radius:5px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10;}
.tc-av:hover .tc-av-tip{opacity:1;}
.tc-photos-badge{display:flex;align-items:center;gap:3px;font-size:10.5px;color:#6b7280;}
.tc-move-btn{display:none;font-size:11.5px;color:#6b7280;background:#f3f4f6;border:none;border-radius:6px;padding:5px 8px;cursor:pointer;font-family:'Figtree',sans-serif;font-weight:600;margin-top:7px;width:100%;text-align:left;transition:all .15s;}
/* ── LIST VIEW ── */
.fw-list{flex:1;overflow-y:auto;padding:14px 20px;}
.list-wrap{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.lt{width:100%;border-collapse:collapse;}
.lt th{background:#f4f6fb;padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid #eaecf0;cursor:pointer;white-space:nowrap;user-select:none;}
.lt th:hover{background:#edeef4;}
.lt td{padding:11px 14px;font-size:13.5px;border-bottom:1px solid #f3f4f6;vertical-align:middle;}
.lt tr:last-child td{border-bottom:none;}
.lt tr:hover td{background:#fafbfd;cursor:pointer;}
.sa{font-size:11px;margin-left:2px;color:#9ca3af;}
.lt-empty{text-align:center;color:#9ca3af;font-size:14px;padding:40px!important;}
/* ── CALENDAR ── */
.fw-cal{flex:1;overflow-y:auto;padding:14px 20px;}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.cal-month{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;flex:1;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e5e7eb;border-radius:12px;overflow:hidden;}
.cal-dh{background:#f4f6fb;padding:8px;text-align:center;font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;}
.cal-cell{background:#fff;min-height:90px;padding:6px;}
.cal-cell.om{background:#fafbfc;}
.cal-num{font-size:12px;font-weight:600;color:#9ca3af;margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.cal-cell.today .cal-num{background:#2563eb;color:#fff;}
.cal-task{font-size:11px;padding:2px 5px;border-radius:4px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;font-weight:500;}
.cal-more{font-size:10.5px;color:#9ca3af;padding:1px 4px;}
/* ── TOAST ── */
.fw-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1d23;color:#fff;border-radius:10px;padding:12px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 30px rgba(0,0,0,.2);z-index:3000;font-size:13.5px;font-weight:500;white-space:nowrap;animation:tIn .25s ease;}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.undo-b{background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-weight:700;font-size:12.5px;font-family:'Figtree',sans-serif;}
/* ── MODAL BASE ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px);}
.modal{background:#fff;border-radius:16px;width:100%;max-height:calc(100vh - 32px);overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .2s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
.m-hd{padding:18px 24px 14px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:5;}
.m-ht{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.m-bd{padding:18px 24px;display:flex;flex-direction:column;gap:14px;}
.m-ft{padding:14px 24px;border-top:1px solid #f3f4f6;display:flex;gap:8px;justify-content:flex-end;align-items:center;position:sticky;bottom:0;background:#fff;z-index:5;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:11.5px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.05em;}
.fi{padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13.5px;font-family:'Figtree',sans-serif;color:#1a1d23;background:#fff;transition:border-color .15s;width:100%;}
.fi:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
textarea.fi{resize:vertical;min-height:80px;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.m-sec{border-top:1px solid #f3f4f6;padding-top:14px;margin-top:2px;}
.m-sec-title{font-size:12px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
/* ── SORT MENU ── */
.sort-menu{position:absolute;top:calc(100%+6px);right:0;background:#fff;border-radius:10px;box-shadow:0 8px 25px rgba(0,0,0,.12);padding:6px;z-index:200;min-width:185px;border:1px solid #e5e7eb;animation:dropIn .15s ease;}
@keyframes dropIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.so{padding:8px 12px;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:space-between;color:#374151;transition:background .1s;}
.so:hover{background:#f3f4f6;}
.so.act{background:#eff6ff;color:#2563eb;font-weight:600;}
/* ── FILTER PANEL ── */
.fp-ov{position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:500;}
.fp{position:fixed;right:0;top:0;bottom:0;width:300px;background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,.1);z-index:501;display:flex;flex-direction:column;animation:fpIn .25s ease;}
@keyframes fpIn{from{transform:translateX(100%)}to{transform:none}}
.fp-hd{padding:20px 20px 16px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;}
.fp-ht{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
.fp-bd{padding:16px 20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:18px;}
.fp-ft{padding:14px 20px;border-top:1px solid #f3f4f6;display:flex;gap:8px;}
.fp-sl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;margin-bottom:7px;}
.fp-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:13.5px;color:#374151;transition:background .1s;background:none;border:none;width:100%;text-align:left;font-family:'Figtree',sans-serif;}
.fp-opt:hover{background:#f3f4f6;}
.fp-opt.sel{background:#eff6ff;color:#2563eb;font-weight:600;}
/* ══ TASK DETAIL PANEL ══ */
.td-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:stretch;justify-content:flex-end;backdrop-filter:blur(2px);}
.td-panel{width:100%;max-width:920px;background:#fff;display:flex;flex-direction:column;overflow:hidden;animation:tdIn .25s ease;box-shadow:-8px 0 40px rgba(0,0,0,.15);}
@keyframes tdIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
.td-hd{background:#fff;border-bottom:1px solid #eaecf0;padding:12px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.td-hd-av{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.td-hd-meta{font-size:13px;color:#9ca3af;font-family:'JetBrains Mono',monospace;}
.td-body{display:flex;flex:1;overflow:hidden;}
.td-left{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:20px;min-width:0;}
.td-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#1a1d23;line-height:1.3;flex:1;word-break:break-word;}
.td-title-input{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#1a1d23;border:1.5px solid #2563eb;border-radius:8px;padding:6px 10px;width:100%;box-shadow:0 0 0 3px rgba(37,99,235,.1);outline:none;}
.td-edit-btn{background:none;border:none;cursor:pointer;color:#9ca3af;padding:4px;border-radius:5px;flex-shrink:0;margin-top:3px;font-size:15px;}
.td-edit-btn:hover{color:#374151;background:#f3f4f6;}
.td-section{display:flex;flex-direction:column;gap:10px;}
.td-sec-hd{display:flex;align-items:center;gap:8px;}
.td-sec-title{font-size:13px;font-weight:700;color:#374151;}
.td-sec-btn{background:none;border:none;color:#2563eb;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'Figtree',sans-serif;}
.td-sec-btn:hover{text-decoration:underline;}
.td-checklist-item{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;background:#f8f9fc;border-radius:8px;}
.td-checklist-item.done .td-cli-text{text-decoration:line-through;color:#9ca3af;}
.td-cli-cb{width:16px;height:16px;accent-color:#2563eb;cursor:pointer;flex-shrink:0;margin-top:1px;}
.td-cli-text{flex:1;font-size:13.5px;color:#374151;}
.td-cli-del{background:none;border:none;color:#d1d5db;cursor:pointer;font-size:16px;line-height:1;}
.td-cli-del:hover{color:#ef4444;}
.td-related-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#f8f9fc;border-radius:8px;}
.td-ri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.td-activity{display:flex;flex-direction:column;gap:4px;}
.td-act-entry{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f3f4f6;}
.td-act-entry:last-child{border-bottom:none;}
.td-act-av{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0;}
.td-act-body{flex:1;min-width:0;}
.td-act-meta{font-size:11.5px;color:#9ca3af;margin-bottom:3px;}
.td-act-meta strong{color:#374151;font-weight:600;}
.td-act-text{font-size:13px;color:#374151;line-height:1.5;white-space:pre-wrap;}
.td-msg-bar{border-top:1px solid #eaecf0;padding:12px 18px;display:flex;align-items:center;gap:8px;flex-shrink:0;background:#fff;}
.td-msg-input{flex:1;border:1.5px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:13.5px;font-family:'Figtree',sans-serif;color:#1a1d23;outline:none;transition:border-color .15s;}
.td-msg-input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.td-share-btn{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Figtree',sans-serif;}
.td-share-btn:hover{background:#1d4ed8;}
.td-right{width:295px;flex-shrink:0;background:#f8f9fc;border-left:1px solid #eaecf0;display:flex;flex-direction:column;overflow:hidden;}
.td-attr-hd{padding:13px 16px 11px;border-bottom:1px solid #eaecf0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.td-attr-title{font-size:13px;font-weight:700;color:#1a1d23;}
.td-attr-body{overflow-y:auto;flex:1;padding:4px 0;}
.td-attr-row{display:flex;align-items:center;padding:6px 14px;gap:8px;border-bottom:1px solid #f0f2f7;min-height:40px;}
.td-attr-label{font-size:11.5px;color:#6b7280;width:108px;flex-shrink:0;display:flex;align-items:center;gap:5px;}
.td-attr-val{flex:1;min-width:0;}
.td-attr-select{width:100%;border:1.5px solid #e5e7eb;border-radius:6px;padding:4px 7px;font-size:12px;font-family:'Figtree',sans-serif;color:#1a1d23;background:#fff;cursor:pointer;outline:none;}
.td-attr-select:focus{border-color:#2563eb;}
.td-attr-select:disabled{background:#f3f4f6;cursor:not-allowed;color:#9ca3af;}
.td-attr-date{width:100%;border:1.5px solid #e5e7eb;border-radius:6px;padding:4px 7px;font-size:12px;font-family:'Figtree',sans-serif;color:#1a1d23;background:#fff;outline:none;}
.td-attr-date:focus{border-color:#2563eb;}
.td-attr-date:disabled{background:#f3f4f6;cursor:not-allowed;}
.td-attr-edit-input{flex:1;border:1.5px solid #2563eb;border-radius:6px;padding:3px 7px;font-size:12px;font-family:'Figtree',sans-serif;color:#1a1d23;outline:none;min-width:0;}
.td-attr-edit-btn{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:13px;padding:2px;border-radius:4px;}
.td-attr-edit-btn:hover{color:#374151;}
.td-tag{font-size:11px;padding:2px 7px;border-radius:12px;font-weight:600;}
.td-watcher-av{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;cursor:default;position:relative;}
.td-watcher-tip{position:absolute;bottom:calc(100%+3px);left:50%;transform:translateX(-50%);background:#1a1d23;color:#fff;font-size:10px;padding:3px 7px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .1s;}
.td-watcher-av:hover .td-watcher-tip{opacity:1;}
/* ── PHOTOS ── */
.photos-page{flex:1;overflow-y:auto;padding:20px;}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.photo-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);transition:box-shadow .15s;}
.photo-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);}
.photo-card img{width:100%;height:150px;object-fit:cover;display:block;}
.photo-card-body{padding:10px 12px;}
.photo-card-name{font-size:12.5px;font-weight:600;color:#1a1d23;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px;}
.photo-card-meta{font-size:11px;color:#9ca3af;}
.photo-card-task{font-size:11.5px;color:#2563eb;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;margin-top:5px;}
.photo-card-task:hover{text-decoration:underline;}
.photo-card-actions{display:flex;gap:5px;margin-top:8px;}
.photo-upload-zone{border:2px dashed #d1d5db;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .15s;background:#fafbfc;}
.photo-upload-zone:hover,.photo-upload-zone.drag{border-color:#2563eb;background:#eff6ff;}
.photo-upload-zone p{font-size:13px;color:#9ca3af;margin-top:8px;}
.photo-thumb{width:70px;height:70px;border-radius:8px;object-fit:cover;border:2px solid #e5e7eb;cursor:pointer;transition:border-color .15s;}
.photo-thumb:hover{border-color:#2563eb;}
.photo-thumbs{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px;}
.photo-thumb-wrap{position:relative;}
.photo-thumb-del{position:absolute;top:-5px;right:-5px;width:16px;height:16px;background:#ef4444;border:none;border-radius:50%;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
/* ── DATABASE PAGE ── */
.db-page{flex:1;overflow-y:auto;padding:20px;}
.db-page-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap;}
.db-page-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#1a1d23;}
.db-page-desc{font-size:13.5px;color:#6b7280;margin-top:3px;}
.db-tabs{display:flex;gap:2px;background:#f3f4f6;border-radius:10px;padding:3px;margin-bottom:18px;flex-wrap:wrap;}
.db-tab{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#6b7280;border:none;background:none;font-family:'Figtree',sans-serif;transition:all .15s;display:flex;align-items:center;gap:6px;}
.db-tab.act{background:#fff;color:#1a1d23;box-shadow:0 1px 3px rgba(0,0,0,.1);}
.db-tab-cnt{background:#e5e7eb;color:#6b7280;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;font-family:'JetBrains Mono',monospace;}
.db-tab.act .db-tab-cnt{background:#dbeafe;color:#2563eb;}
.db-card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;margin-bottom:16px;}
.db-card-hd{padding:14px 18px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.db-card-title{font-size:14px;font-weight:700;color:#1a1d23;display:flex;align-items:center;gap:8px;}
.db-card-desc{font-size:12px;color:#9ca3af;margin-top:2px;}
.db-table{width:100%;border-collapse:collapse;}
.db-table th{background:#f8f9fc;padding:9px 16px;text-align:left;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid #eaecf0;}
.db-table td{padding:10px 16px;font-size:13.5px;border-bottom:1px solid #f3f4f6;vertical-align:middle;}
.db-table tr:last-child td{border-bottom:none;}
.db-table tr:hover td{background:#fafbfd;}
.db-empty{text-align:center;color:#9ca3af;padding:30px;font-size:14px;}
.db-add-row{padding:10px 16px;border-top:1px solid #f3f4f6;display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:#fafbfd;}
.db-add-input{flex:1;min-width:120px;border:1.5px solid #e5e7eb;border-radius:8px;padding:7px 11px;font-size:13.5px;font-family:'Figtree',sans-serif;color:#1a1d23;outline:none;background:#fff;}
.db-add-input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.db-color-swatch{width:24px;height:24px;border-radius:6px;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.db-color-swatch.sel{border-color:#1a1d23;}
.color-swatches{display:flex;gap:3px;flex-wrap:wrap;}
.db-inline-edit{border:1.5px solid #2563eb;border-radius:6px;padding:4px 8px;font-size:13px;font-family:'Figtree',sans-serif;color:#1a1d23;outline:none;width:100%;background:#fff;}
.db-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:12px;font-size:11.5px;font-weight:600;}
/* ── USERS PAGE ── */
.users-page{flex:1;overflow-y:auto;padding:20px;}
.user-card{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;gap:16px;margin-bottom:10px;transition:box-shadow .15s;}
.user-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);}
.user-av-lg{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:15px;font-weight:700;color:#1a1d23;}
.user-email{font-size:12.5px;color:#9ca3af;margin-top:1px;}
.user-meta{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap;}
.role-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:11.5px;font-weight:600;}
.user-actions{display:flex;gap:6px;flex-shrink:0;}
/* ── INVITE MODAL ── */
.invite-creds{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:10px;padding:14px 16px;margin-top:10px;}
.invite-creds-title{font-size:12px;font-weight:700;color:#16a34a;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;}
.invite-creds-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #d1fae5;}
.invite-creds-row:last-child{border-bottom:none;}
.invite-creds-label{font-size:12px;color:#6b7280;}
.invite-creds-val{font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:700;color:#1a1d23;}
/* ── ACCESS DENIED ── */
.access-denied{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px;text-align:center;color:#9ca3af;}
.access-denied-icon{font-size:48px;margin-bottom:16px;}
.access-denied h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:#374151;margin-bottom:8px;}
/* ── MULTISELECT DROPDOWN ── */
.ms-wrap{position:relative;width:100%;}
.ms-trigger{cursor:pointer;display:flex;flex-wrap:wrap;gap:3px;min-height:34px;padding:4px 8px;border-radius:8px;border:1.5px solid #e5e7eb;background:#fff;align-items:center;}
.ms-trigger.sm{min-height:28px;padding:3px 7px;}
.ms-trigger:hover{border-color:#9ca3af;}
.ms-drop{position:absolute;top:calc(100%+4px);left:0;right:0;background:#fff;border-radius:10px;box-shadow:0 8px 25px rgba(0,0,0,.15);border:1px solid #e5e7eb;z-index:150;max-height:200px;overflow-y:auto;padding:4px;}
.ms-opt{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:#374151;transition:background .1s;border:none;background:none;width:100%;text-align:left;font-family:'Figtree',sans-serif;}
.ms-opt:hover{background:#f3f4f6;}
.ms-opt.sel{background:#eff6ff;color:#2563eb;font-weight:600;}
/* ── RESPONSIVE ── */
/* ── BOTTOM NAV (mobile only) ── */
.mob-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e7eb;z-index:200;padding-bottom:env(safe-area-inset-bottom,0px);flex-shrink:0;}
.mob-nav-bar{display:flex;align-items:stretch;}
.mob-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border:none;background:none;cursor:pointer;font-family:'Figtree',sans-serif;color:#9ca3af;font-size:10px;font-weight:600;gap:3px;min-height:56px;transition:color .15s;-webkit-tap-highlight-color:transparent;}
.mob-nav-btn.act{color:#2563eb;}
.mob-nav-btn svg{flex-shrink:0;}
.mob-nav-btn span{white-space:nowrap;}
/* FAB */
.mob-fab{position:fixed;bottom:calc(68px + env(safe-area-inset-bottom,0px));right:18px;z-index:210;width:52px;height:52px;background:#2563eb;border-radius:50%;display:none;align-items:center;justify-content:center;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(37,99,235,.5);color:#fff;font-size:24px;line-height:1;transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent;}
.mob-fab:active{transform:scale(.92);box-shadow:0 2px 10px rgba(37,99,235,.4);}
/* Sidebar overlay */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299;-webkit-tap-highlight-color:transparent;}

@media(max-width:767px){
  /* Safe area & layout */
  body{overflow:auto;-webkit-overflow-scrolling:touch;}
  .fw-app{height:100dvh;min-height:100dvh;flex-direction:column;}
  .fw-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;padding-bottom:calc(64px + env(safe-area-inset-bottom,0px));}

  /* Sidebar: slide in from left, full height, with overlay */
  .fw-sb{position:fixed;height:100dvh;top:0;left:0;z-index:300;width:80vw;max-width:280px;transition:transform .25s ease;transform:translateX(0);}

  /* Top bar */
  .fw-tb{padding:0 12px 0 12px;height:52px;padding-top:env(safe-area-inset-top,0px);}

  /* Hide desktop-only elements */
  .d-only{display:none!important;}

  /* Show mobile-only elements */
  .mob-bottom-nav{display:block;}
  .mob-fab{display:flex;}
  .tc-move-btn{display:block;}
  .mob-cs{display:flex;}

  /* Board */
  .fw-board{padding:10px;overflow-x:hidden;overflow-y:auto;height:auto;flex:1;flex-direction:column;}
  .fw-col{width:100%;max-height:none;}

  /* Filter panel */

  /* Forms: 1 column */
  .fr2,.fr3{grid-template-columns:1fr;}

  /* Task detail: full screen, attributes as tab */
  .td-panel{max-width:100%;width:100%;border-radius:0;}
  .td-right{display:none;}
  .td-ov{padding:0;align-items:flex-end;}

  /* Modals: full screen on mobile */
  .modal-ov{padding:0;align-items:flex-end;}
  .modal{border-radius:16px 16px 0 0;max-height:96dvh;animation:slideUp .25s ease;}
  .punch-modal{border-radius:16px 16px 0 0;max-height:96dvh;}

  /* Photos */
  .photo-grid{grid-template-columns:repeat(2,1fr);}

  /* Touch target improvements */
  .btn{min-height:40px;}
  .mob-pill{min-height:36px;padding:6px 14px;}
  .fi{min-height:44px;font-size:16px;} /* 16px prevents iOS zoom on focus */
  select.fi{min-height:44px;font-size:16px;}

  /* Lists: make scrollable */
  .fw-list{padding:8px 0;overflow-x:auto;}

  /* Calendar */
  .fw-cal{padding:10px 8px;}

  /* Users/DB page */
  .user-card{flex-wrap:wrap;}
  .user-actions{flex-wrap:wrap;gap:6px;width:100%;}

const { useState, useEffect, useRef, useCallback, useMemo } = React;

  switch(action){

/* Compress an image File to JPEG base64 ≤ ~200KB */
const compressImage = (file) => new Promise((resolve) => {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1100;
      let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.72));
    };
    img.onerror = () => resolve(ev.target.result); // fallback: raw
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

/* SHA-256 password hashing via browser SubtleCrypto */
const hashPassword = async pw => {
  if(!pw) return '';
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
};
const isHashed = pw => typeof pw === 'string' && pw.length === 64 && /^[0-9a-f]+$/.test(pw);

function XlsxImportModal({tasks,onImport,onClose}){
  const [drag,setDrag]=useState(false);
  const [file,setFile]=useState(null);
  const [rows,setRows]=useState([]);
  const [importing,setImporting]=useState(false);
  const [results,setResults]=useState(null);
  const dropRef=useRef(); const inputRef=useRef();

  useEffect(()=>{const esc=e=>{if(e.key==="Escape")onClose();};window.addEventListener("keydown",esc);return()=>window.removeEventListener("keydown",esc);},[onClose]);

  const norm=s=>String(s||"").toLowerCase().replace(/[\s._\-]+/g,"");
  const COL_MAP={
    plitemno:"plItemNo",plno:"plItemNo",itemnr:"plItemNo",itemnumber:"plItemNo","pl item no":"plItemNo",
    room:"room",roomnumber:"room",roomno:"room",
    description1:"description1",desc1:"description1",description:"description1","description 1":"description1",
    tagno:"tagNo",tag:"tagNo",tagnumber:"tagNo","tag no":"tagNo",
    description2:"description2",desc2:"description2",remark:"description2",remarks:"description2","description 2":"description2",
    plcat:"plCat",plcategory:"plCat","pl cat":"plCat","pl category":"plCat",cat:"plCat",category:"plCat",
    status:"status",originalstatus:"status",
  };

  const parseFile=async f=>{
    try{
      const ab=await f.arrayBuffer();
      const wb=XLSX.read(ab,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rawRows=XLSX.utils.sheet_to_json(ws,{defval:""});
      if(!rawRows.length){alert("No data rows found in Excel file.");return;}
      const mapped=rawRows.map(row=>{
        const r={};
        Object.entries(row).forEach(([k,v])=>{
          const field=COL_MAP[norm(k)]||COL_MAP[k.toLowerCase()];
          if(field) r[field]=sanitize(String(v).trim());
        });
        return r;
      }).filter(r=>r.plItemNo||r.room||r.description1);
      setRows(mapped);setFile(f);
    }catch(e){alert("Could not read Excel file: "+e.message);}
  };

  const handleDrop=e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files?.[0];if(f)parseFile(f);};
  const handlePick=e=>{const f=e.target.files?.[0];if(f)parseFile(f);};

  const handleImport=async()=>{
    if(!rows.length)return;
    setImporting(true);
    try{
      const res={added:[],updated:[],unchanged:[]};
      await onImport(rows,res);
      setResults(res);
    }catch(e){alert("Import error: "+e.message);}
    setImporting(false);
  };

  return(
    <div className="modal-ov" onClick={onClose}>
      <div className="modal" style={{maxWidth:640}} onClick={e=>e.stopPropagation()}>
        <div className="m-hd"><h2 className="m-ht">📊 Import Excel Punchlist</h2><button type="button" className="btn btn-g btn-ic" onClick={onClose}>✕</button></div>
        <div className="m-bd">
          {!results&&(
            <>
              <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"11px 14px",fontSize:12.5,color:"#1d4ed8",lineHeight:1.7}}>
                <strong>Expected columns:</strong> PL Item no · Room · Description 1 · Tag no · Description 2 · PL Cat. · Status<br/>
                <span style={{color:"#6b7280",fontSize:11.5}}>Existing items keep their photos and app status. New items are added. Nothing is deleted.</span>
              </div>
              <div ref={dropRef} className={`xlsx-drop${drag?" drag":""}${file?" has-file":""}`}
                onClick={()=>!file&&inputRef.current?.click()}
                onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={handleDrop}>
                <div style={{fontSize:38,marginBottom:8}}>{file?"📗":"📊"}</div>
                {file
                  ? <><div style={{fontWeight:700,fontSize:14.5,color:"#15803d",marginBottom:4}}>✅ {file.name}</div><div style={{fontSize:13,color:"#6b7280"}}>{rows.length} row{rows.length!==1?"s":""} found</div><button type="button" className="btn btn-s" style={{marginTop:10,fontSize:12}} onClick={e=>{e.stopPropagation();setFile(null);setRows([]);}}>✕ Remove</button></>
                  : <><div style={{fontWeight:700,fontSize:14.5,color:"#374151",marginBottom:4}}>Drag & drop your Excel file here</div><div style={{fontSize:13,color:"#9ca3af",marginBottom:8}}>or click to browse</div><div style={{fontSize:11.5,color:"#c4c9d4"}}>.xlsx · .xls · .csv</div></>
                }
              </div>
              <input ref={inputRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={handlePick}/>
              {rows.length>0&&(
                <div>
                  <div className="fl" style={{marginBottom:6}}>Preview (first 5 rows)</div>
                  <div className="xlsx-preview">
                    <table><thead><tr>{["PL Item No","Room","Description 1","Tag No","PL Cat.","Status"].map(h=><th key={h}>{h}</th>)}</tr></thead>

                      <tr key={i}>

/* ════════════════════════════════
   PHOTO EXPORT MODAL  [Rev 01]
   Bulk export via JSZip with folder structure
════════════════════════════════ */
function PhotoExportModal({tasks,photos,onClose}){
  const [mode,setMode]=useState(null);
  const [exporting,setExporting]=useState(false);

  useEffect(()=>{const esc=e=>{if(e.key==="Escape")onClose();};window.addEventListener("keydown",esc);return()=>window.removeEventListener("keydown",esc);},[onClose]);

  const rooms=useMemo(()=>{const s=new Set();tasks.forEach(t=>{if(t.attrs?.roomNumber)s.add(t.attrs.roomNumber);});return[...s].sort();},[tasks]);
  const itemsWithPhotos=useMemo(()=>tasks.filter(t=>(t.photoIds||[]).length>0),[tasks]);

  const b64toBlob=b64=>{
    try{
      const [h,d]=b64.split(",");
      const mime=h.match(/:(.*?);/)?.[1]||"image/jpeg";
      const bs=atob(d);const u=new Uint8Array(bs.length);
      for(let i=0;i<bs.length;i++)u[i]=bs.charCodeAt(i);
      return new Blob([u],{type:mime});
    }catch{return null;}
  };

  const doExport=async(filterMode,filterValue)=>{
    setExporting(true);
    try{
      let fp=photos;
      if(filterMode==="room"&&filterValue)fp=photos.filter(p=>{const t=tasks.find(x=>String(x.id)===String(p.taskId));return t?.attrs?.roomNumber===filterValue;});
      else if(filterMode==="item"&&filterValue)fp=photos.filter(p=>String(p.taskId)===String(filterValue));
      if(!fp.length){alert("No photos found for this selection.");setExporting(false);return;}
      const zip=new JSZip();
      fp.forEach(p=>{
        const t=tasks.find(x=>String(x.id)===String(p.taskId));
        const room=t?.attrs?.roomNumber||"Unknown";
        const blob=b64toBlob(p.data);
        if(blob)zip.file(`Punch_Photos/${room}/${p.name}`,blob);
      });
      const blob=await zip.generateAsync({type:"blob",compression:"DEFLATE",compressionOptions:{level:6}});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;a.download=`FieldWork_Photos_${filterMode==="room"?filterValue:filterMode==="item"?`Item${filterValue}`:"All"}_${TODAY}.zip`;
      a.click();URL.revokeObjectURL(url);
    }catch(e){alert("Export failed: "+e.message);}
    setExporting(false);
  };

  return(
    <div className="modal-ov" onClick={onClose}>
      <div className="modal" style={{maxWidth:500}} onClick={e=>e.stopPropagation()}>
        <div className="m-hd"><h2 className="m-ht">📤 Export Photos</h2><button type="button" className="btn btn-g btn-ic" onClick={onClose}>✕</button></div>
        <div className="m-bd">
          {exporting&&<div style={{textAlign:"center",padding:"20px",color:"#2563eb",fontWeight:600}}>⏳ Building ZIP file…</div>}
          {!exporting&&!mode&&(
            <>
              <div style={{fontSize:13,color:"#6b7280",marginBottom:4}}>Photos exported as <strong>.zip</strong> with folder structure:<br/><code style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:"#374151"}}>Punch_Photos / Room / filename.jpg</code></div>
              <div className="export-option" onClick={()=>doExport("all")}>
                <div className="export-opt-icon">📁</div>
                <div className="export-opt-info"><div className="export-opt-title">Export All Photos</div><div className="export-opt-sub">{photos.length} photo{photos.length!==1?"s":""} from all rooms</div></div>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#c4c9d4" strokeWidth="2" strokeLinecap="round"><path d="m9 18 6-6-6-6"/></svg>
              </div>
              <div className="export-option" onClick={()=>setMode("room")}>
                <div className="export-opt-icon">🚪</div>
                <div className="export-opt-info"><div className="export-opt-title">Export by Room</div><div className="export-opt-sub">Choose a specific room</div></div>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#c4c9d4" strokeWidth="2" strokeLinecap="round"><path d="m9 18 6-6-6-6"/></svg>
              </div>
              <div className="export-option" onClick={()=>setMode("item")}>
                <div className="export-opt-icon">📋</div>
                <div className="export-opt-info"><div className="export-opt-title">Export by Punch Item</div><div className="export-opt-sub">Choose a specific item</div></div>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#c4c9d4" strokeWidth="2" strokeLinecap="round"><path d="m9 18 6-6-6-6"/></svg>
              </div>
            </>
          )}
          {!exporting&&mode==="room"&&(
            <div>
              <button type="button" className="btn btn-g" style={{marginBottom:10}} onClick={()=>setMode(null)}>← Back</button>
              <div className="fl" style={{marginBottom:7}}>Select a room:</div>
              <div className="export-list">
                {rooms.length===0&&<div style={{textAlign:"center",color:"#9ca3af",padding:16}}>No rooms with photos found.</div>}
                {rooms.map(r=>{const cnt=photos.filter(p=>{const t=tasks.find(x=>String(x.id)===String(p.taskId));return t?.attrs?.roomNumber===r;}).length;return(
                  <div key={r} className="export-list-item" onClick={()=>doExport("room",r)}>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:"#2563eb"}}>{r}</span>
                    <span style={{fontSize:12,color:"#9ca3af"}}>{cnt} photo{cnt!==1?"s":""}</span>
                  </div>
                );})}
              </div>
            </div>
          )}
          {!exporting&&mode==="item"&&(
            <div>
              <button type="button" className="btn btn-g" style={{marginBottom:10}} onClick={()=>setMode(null)}>← Back</button>
              <div className="fl" style={{marginBottom:7}}>Select a punch item:</div>
              <div className="export-list">
                {itemsWithPhotos.length===0&&<div style={{textAlign:"center",color:"#9ca3af",padding:16}}>No items with photos found.</div>}
                {itemsWithPhotos.map(t=>{const cnt=(t.photoIds||[]).length;return(
                  <div key={t.id} className="export-list-item" onClick={()=>doExport("item",t.id)}>
                    <div style={{flex:1,minWidth:0}}><div style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:"#2563eb",fontSize:12}}>{t.attrs?.plItemNo||`#${t.id}`}</div><div style={{fontSize:12.5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div></div>
                    <span style={{fontSize:12,color:"#9ca3af",flexShrink:0}}>{cnt} photo{cnt!==1?"s":""}</span>
                  </div>
                );})}
              </div>
            </div>
          )}
        </div>
        <div className="m-ft"><button type="button" className="btn btn-s" onClick={onClose}>Close</button></div>
      </div>
    </div>
  );
}

const encodeInvite = user => {
  try { return btoa(unescape(encodeURIComponent(JSON.stringify(user)))); }
  catch { return null; }
};
const decodeInvite = token => {
  try { return JSON.parse(decodeURIComponent(escape(atob(token)))); }
  catch { return null; }
};
const buildInviteUrl = user => {
  const base = window.location.href.split('#')[0];

  const safe={id:user.id,initials:user.initials,name:user.name,email:user.email,role:user.role,color:user.color,status:'active',joinedAt:user.joinedAt};
  return base + '#invite=' + encodeInvite(safe);
};

/* ════════════════════════════════════════════════════
   ERROR BOUNDARY — catches render crashes (white screen)
════════════════════════════════════════════════════ */
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null, info: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    this.setState({ info });
    console.error('FieldWork render error:', error, info);
  }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{minHeight:'100vh',background:'#0e1118',display:'flex',alignItems:'center',justifyContent:'center',padding:20,fontFamily:"'Figtree',sans-serif"}}>
          <div style={{background:'#fff',borderRadius:16,padding:'32px 36px',maxWidth:520,width:'100%',boxShadow:'0 20px 60px rgba(0,0,0,.4)'}}>
            <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,marginBottom:8,color:'#1a1d23'}}>Something went wrong</div>
            <div style={{fontSize:13.5,color:'#6b7280',marginBottom:16,lineHeight:1.6}}>
              FieldWork encountered an unexpected error. This is usually caused by a browser compatibility issue or a failed Firebase connection.
            </div>
            <div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,padding:'10px 14px',fontSize:12,fontFamily:"'JetBrains Mono',monospace",color:'#ef4444',marginBottom:20,wordBreak:'break-word'}}>
              {this.state.error?.message||'Unknown error'}
            </div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <button onClick={()=>window.location.reload()} style={{background:'#2563eb',color:'#fff',border:'none',borderRadius:8,padding:'9px 18px',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:"'Figtree',sans-serif"}}>
                🔄 Reload Page
              </button>
              <button onClick={()=>{localStorage.clear();window.location.reload();}} style={{background:'#f3f4f6',color:'#374151',border:'1px solid #e5e7eb',borderRadius:8,padding:'9px 18px',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:"'Figtree',sans-serif"}}>
                🗑 Clear Cache & Reload
              </button>
            </div>
            <div style={{marginTop:14,fontSize:11.5,color:'#9ca3af'}}>
              Open browser DevTools (F12) → Console tab for detailed error information.
            </div>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

function LoginPage({users,onLogin}){
  const [email,setEmail]=useState("");const [password,setPassword]=useState("");const [err,setErr]=useState("");const [busy,setBusy]=useState(false);
  const submit=async e=>{
    e.preventDefault();
    setBusy(true);setErr('');
    try{
      const hashed=await hashPassword(password);
      // Support both hashed passwords (new) and plain-text (migration)
      const u=users.find(x=>x.email.toLowerCase()===email.toLowerCase()&&x.status!=="inactive"&&(x.password===hashed||(!isHashed(x.password)&&x.password===password)));
      if(!u){setErr("Invalid email or password. Please try again.");setBusy(false);return;}
      // Migrate plaintext password to hash on first successful login
      const fs=getFS();
      if(fs&&!isHashed(u.password)){
        await fs.collection('users').doc(u.id).update({password:hashed}).catch(console.error);
        onLogin({...u,password:hashed,status:u.status==="invited"?"active":u.status});
      } else {
        onLogin(u.status==="invited"?{...u,status:"active"}:u);
      }
    }catch(ex){setErr("Login error: "+ex.message);}
    setBusy(false);
  };
  return(
    <div className="login-page">
      <div className="login-card">
        <div className="login-logo">
          <div className="login-logo-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 17.5h7M17.5 14v7"/></svg></div>
          <span className="login-logo-tx" style={{fontFamily:"'Syne',sans-serif"}}>FieldWork</span>
        </div>
        <h1 className="login-title">Welcome back</h1>
        <p className="login-sub">Sign in to your account to continue.</p>
        {err&&<div className="login-err">⚠️ {err}</div>}
        <form onSubmit={submit}>
          <div className="fg" style={{marginBottom:14}}>
            <label className="fl" htmlFor="le">Email address</label>
            <input id="le" className="fi" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" autoFocus required/>
          </div>
          <div className="fg" style={{marginBottom:22}}>
            <label className="fl" htmlFor="lp">Password</label>
            <input id="lp" className="fi" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" required/>
          </div>
          <button type="submit" className="btn btn-p" style={{width:"100%",justifyContent:"center",padding:"11px",fontSize:15}} disabled={busy}>{busy?"Signing in…":"Sign In"}</button>
        </form>

      </div>
    </div>
  );
}

/* ════════════════════════════════

════════════════════════════════ */
function TaskCard({task,draggingId,onDragStart,onDragEnd,onClick,onMoveClick,currentUser,users}){
  const late=isOverdue(task.dueDate),pri=PRI[task.priority],isDragging=draggingId===task.id;
  const person=users.find(u=>u.id===task.assignee)||{initials:task.assignee,color:"#6b7280",name:task.assignee};
  const canDrag=can(currentUser,"drag_task");
  /* Rev 01 — punch status badge */
  const punchStatus=(task.attrs?.punchStatus)||"Open";
  const photoCnt=(task.photoIds||task.photos||[]).length;
  return(
    <article className={`tc${isDragging?" dragging":""}${late?" overdue":""}`}
      draggable={canDrag} onDragStart={canDrag?e=>onDragStart(e,task.id):undefined} onDragEnd={canDrag?onDragEnd:undefined}
      onClick={onClick} role="button" tabIndex={0}
      onKeyDown={e=>{if(e.key==="Enter")onClick();}}>
      {canDrag&&<span className="tc-handle" aria-hidden="true">⠿</span>}
      <div className="tc-id">
        <span>#{task.id}</span>
        {/* Rev 01 — PL Item number displayed on card */}
        {task.attrs?.plItemNo&&<span style={{color:"#2563eb",fontWeight:700,marginLeft:4}}>{task.attrs.plItemNo}</span>}
      </div>
      <div className="tc-title">{task.title}</div>
      {task.description&&<div className="tc-desc">{task.description}</div>}
      <div className="tc-meta">
        {/* Rev 01 — open/closed badge */}
        <span className={punchStatus==="Closed"?"ps-closed":"ps-open"}>{punchStatus==="Closed"?"✅":"🔴"} {punchStatus}</span>
        <span className="tc-pri" style={{color:pri.color,background:pri.bg}}>{pri.icon} {pri.label}</span>
        {task.dueDate&&<span className={`tc-due${late?" late":""}`}>{late?"⚠️":"📅"} {fmtDate(task.dueDate)}</span>}
        {photoCnt>0&&<span className="tc-photos-badge">📷 {photoCnt}</span>}
        <span className="tc-av" style={{background:person.color}} title={person.name}>{person.initials}<span className="tc-av-tip">{person.name}</span></span>
      </div>
      <button className="tc-move-btn m-only" onClick={e=>{e.stopPropagation();onMoveClick(task);}}>Move to column →</button>
    </article>
  );
}

function TaskDetailPanel({task,onClose,onUpdate,onDelete,tasks,db,users,currentUser,photos=[],onDeletePhoto}){
  const [t,setT]=useState(task);
  const [editTitle,setEditTitle]=useState(false);const [titleVal,setTitleVal]=useState(task.title);
  const [newCheck,setNewCheck]=useState(""); const [newMsg,setNewMsg]=useState(""); const [actOrder,setActOrder]=useState("oldest");
  const [mobileTab,setMobileTab]=useState("details");
  const canEdit=can(currentUser,"edit_task",t);
  const save=useCallback(updates=>{const m={...t,...updates};setT(m);onUpdate(m);},[t,onUpdate]);
  const saveAttr=(k,v)=>save({attrs:{...t.attrs,[k]:v}});
  const addCheck=()=>{if(!newCheck.trim())return;save({checklist:[...(t.checklist||[]),{id:Date.now(),text:newCheck.trim(),done:false}]});setNewCheck("");};
  const toggleCheck=id=>save({checklist:t.checklist.map(c=>c.id===id?{...c,done:!c.done}:c)});
  const delCheck=id=>save({checklist:t.checklist.filter(c=>c.id!==id)});
  const addMsg=()=>{
    if(!newMsg.trim())return;
    /* Rev 01 — full date+time timestamp */
    const e={id:Date.now(),author:currentUser.id,time:nowStr(),type:"comment",text:newMsg.trim()};
    save({activity:[...(t.activity||[]),e]});setNewMsg("");
  };
  const addPhotos=async files=>{
    for(const f of files){
      const compressed=await compressImage(f._file||f);
      /* Rev 01 — full date+time on photos */
      const photo={id:'photo_'+Date.now()+'_'+Math.random().toString(36).slice(2),taskId:String(t.id),name:f.name,data:compressed,size:f.size,type:'image/jpeg',uploadedAt:nowStr(),uploadedBy:currentUser.id};
      const fs=getFS();
      if(fs){
        await fs.collection('photos').doc(photo.id).set(photo);
        await fs.collection('tasks').doc(String(t.id)).update({photoIds:firebase.firestore.FieldValue.arrayUnion(photo.id)});
      }
    }

    {label:"Watchers",icon:"👁️",type:"watchers",key:"watchersList",opts:pIdOpts,colorMap:pColMap},

function BoardView({columns,tasksByColumn,draggingId,dragOverCol,mobileCol,onDragStart,onDragEnd,onDragOver,onDragLeave,onDrop,onTaskClick,onAddTask,onMoveTask,currentUser,users}){
  const [moveTask,setMoveTask]=useState(null);
  const [isMob,setIsMob]=useState(window.innerWidth<768);
  useEffect(()=>{const h=()=>setIsMob(window.innerWidth<768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  return(
    <>
      <section className="fw-board">
        {columns.map(col=>{
          const tasks=tasksByColumn[col.id]||[],isOver=dragOverCol===col.id,color=COL_COLORS[col.id]||"#6b7280";
          if(isMob&&mobileCol!==col.id)return null;
          return(
            <div key={col.id} className={`fw-col${isOver?" dov":""}`} style={{border:`2px solid ${isOver?color:"transparent"}`}}
              onDragOver={e=>onDragOver(e,col.id)} onDragLeave={onDragLeave} onDrop={e=>onDrop(e,col.id)} role="list">
              <div className="col-hd"><div className="col-dot" style={{background:color}}/><h2 className="col-title">{col.label}</h2><span className="col-cnt">{tasks.length}</span></div>
              <div className="col-body">
                {tasks.length===0?(<div className="col-empty"><span style={{fontSize:22,opacity:.35}}>◻</span><span className="col-empty-txt">No tasks.<br/>Add one below.</span></div>):tasks.map(t=><div key={t.id} role="listitem"><TaskCard task={t} draggingId={draggingId} onDragStart={onDragStart} onDragEnd={onDragEnd} onClick={()=>onTaskClick(t)} onMoveClick={setMoveTask} currentUser={currentUser} users={users}/></div>)}
                <button className={`col-add${!can(currentUser,"create_task")?" disabled":""}`} onClick={()=>can(currentUser,"create_task")&&onAddTask(col.id)}>＋ Add task</button>
              </div>
            </div>
          );
        })}
      </section>
      {moveTask&&(
        <div className="modal-ov" onClick={()=>setMoveTask(null)}>
          <div className="modal" style={{maxWidth:300}} onClick={e=>e.stopPropagation()}>
            <div className="m-hd"><span className="m-ht">Move to…</span><button className="btn btn-g btn-ic" onClick={()=>setMoveTask(null)}>✕</button></div>
            <div style={{padding:"10px 16px",display:"flex",flexDirection:"column",gap:3}}>
              {columns.filter(c=>c.id!==moveTask.column).map(c=>(
                <button key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:7,border:"none",background:"none",cursor:"pointer",fontFamily:"'Figtree',sans-serif",fontSize:13,color:"#374151",textAlign:"left"}} onClick={()=>{onMoveTask(moveTask.id,c.id);setMoveTask(null);}}>
                  <span style={{width:10,height:10,borderRadius:"50%",background:COL_COLORS[c.id],display:"inline-block"}}/>{c.label}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

/* ════════════════════════════════
   CALENDAR
════════════════════════════════ */
function CalendarView({tasks,calMonth,setCalMonth,onTaskClick}){
  const year=calMonth.getFullYear(),month=calMonth.getMonth();
  const firstDay=new Date(year,month,1).getDay(),daysInMonth=new Date(year,month+1,0).getDate(),dipsP=new Date(year,month,0).getDate();
  const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const byDay=useMemo(()=>{const m={};tasks.forEach(t=>{if(!t.dueDate)return;const[y,mo,d]=t.dueDate.split("-").map(Number);if(y===year&&mo-1===month){if(!m[d])m[d]=[];m[d].push(t);}});return m;},[tasks,year,month]);
  const cells=[];
  for(let i=firstDay-1;i>=0;i--)cells.push({day:dipsP-i,cur:false});
  for(let d=1;d<=daysInMonth;d++)cells.push({day:d,cur:true});
  while(cells.length%7!==0)cells.push({day:cells.length-daysInMonth-firstDay+1,cur:false});
  const now=new Date(),td=now.getDate(),tm=now.getMonth(),ty=now.getFullYear();
  return(
    <div className="fw-cal">
      <div className="cal-nav"><h2 className="cal-month">{MONTHS[month]} {year}</h2><button className="btn btn-s btn-ic" onClick={()=>setCalMonth(new Date(year,month-1,1))}>‹</button><button className="btn btn-s btn-ic" onClick={()=>setCalMonth(new Date(year,month+1,1))}>›</button></div>
      <div className="cal-grid">
        {DAYS.map(d=><div key={d} className="cal-dh">{d}</div>)}
        {cells.map((cell,i)=>{
          const isToday=cell.cur&&cell.day===td&&month===tm&&year===ty;
          const dt=cell.cur?(byDay[cell.day]||[]):[];
          return(<div key={i} className={`cal-cell${!cell.cur?" om":""}${isToday?" today":""}`}>
            <div className="cal-num">{cell.day}</div>
            {dt.slice(0,3).map(t=><div key={t.id} className="cal-task" style={{background:COL_COLORS[t.column]+"22",color:COL_COLORS[t.column]||"#6b7280"}} onClick={()=>onTaskClick(t)} title={t.title}>{t.title}</div>)}
            {dt.length>3&&<div className="cal-more">+{dt.length-3} more</div>}
          </div>);
        })}
      </div>
    </div>
  );
}
